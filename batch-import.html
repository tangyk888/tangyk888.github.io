<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>仓库仓位查询系统 - 数据导入</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6 transition-all duration-300 hover:shadow-lg hover:translate-y-[-2px];
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all duration-300 transform hover:scale-105 active:scale-95;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white transition-all duration-300;
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            .slide-in {
                animation: slideIn 0.3s ease-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes slideIn {
                from { transform: translateY(20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">YICHENGQIPEI</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="index.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">返回主页</a>
                        <a href="user-management.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">用户管理</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">数据导入</h1>
            <p class="text-gray-400">通过Excel或CSV文件批量导入盘点数据</p>
            <div class="w-24 h-1 bg-primary mx-auto mt-4"></div>
        </div>

        <!-- 批量导入卡片 -->
        <div class="card mb-8 slide-in">
            <div class="flex items-center mb-6">
                <i class="fa fa-upload text-primary mr-2"></i>
                <h2 class="text-lg font-semibold">导入设置</h2>
            </div>
            
            <!-- 标签页导航 -->
            <div class="flex border-b border-gray-700 mb-6">
                <button class="tab-btn px-4 py-2 border-b-2 border-primary text-primary" data-tab="file">文件导入</button>
                <button class="tab-btn px-4 py-2 border-b-2 border-transparent text-gray-400 hover:text-white" data-tab="manual">手动录入</button>
            </div>
            
            <!-- 文件导入标签页 -->
            <div id="file-tab" class="tab-content">
                <div class="space-y-6">
                    <div>
                        <p class="text-gray-400 mb-4">请上传Excel文件进行批量盘点。文件应包含以下列（顺序固定）：</p>

                    <div class="mt-4 p-4 bg-gray-800 rounded-lg">
                        <p class="text-sm text-gray-300">示例格式：</p>
                        <div class="grid grid-cols-3 gap-2 mt-2 text-xs">
                            <div class="bg-gray-700 p-2 rounded text-center">编码</div>
                            <div class="bg-gray-700 p-2 rounded text-center">数量</div>
                            <div class="bg-gray-700 p-2 rounded text-center">仓位</div>
                            <div class="bg-gray-800 p-2 rounded">17130-PNA-003</div>
                            <div class="bg-gray-800 p-2 rounded">2</div>
                            <div class="bg-gray-800 p-2 rounded">JY</div>
                            <div class="bg-gray-800 p-2 rounded">36531-RFE-J01</div>
                            <div class="bg-gray-800 p-2 rounded">1</div>
                            <div class="bg-gray-800 p-2 rounded">JY</div>
                        </div>
                    </div>
                    </div>
                    <div class="border border-gray-700 rounded-lg p-6 text-center">
                        <input type="file" id="batchFile" class="input w-full mb-4" accept=".xlsx" capture="camera" multiple>
                        <p class="text-gray-400 text-sm" id="selectedFileName">未选择文件</p>
                    </div>
                    <div class="flex justify-between space-x-4">
                        <button id="cancelBtn" class="btn bg-gray-700 text-white hover:bg-gray-600 flex-1">取消</button>
                        <button id="importBtn" class="btn btn-primary flex-1">导入</button>
                    </div>
                </div>
            </div>
            
            <!-- 手动录入标签页 -->
            <div id="manual-tab" class="tab-content hidden">
                <div class="space-y-6">
                    <div>
                        <p class="text-gray-400 mb-4">请手动录入盘点信息：</p>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-gray-400 mb-2">编码</label>
                                <input type="text" id="manualCode" class="input" placeholder="输入编码">
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-2">仓位</label>
                                <input type="text" id="manualLocation" class="input" placeholder="输入仓位">
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-2">数量</label>
                                <div class="flex items-center">
                                    <input type="number" id="manualQuantity" class="input flex-1" placeholder="输入数量">
                                    <div class="flex space-x-2 ml-2">
                                        <button type="button" id="decreaseManualQuantity" class="btn bg-green-600 hover:bg-green-500 text-white w-10 h-10 flex items-center justify-center p-0">
                                            <i class="fa fa-minus"></i>
                                        </button>
                                        <button type="button" id="increaseManualQuantity" class="btn bg-green-600 hover:bg-green-500 text-white w-10 h-10 flex items-center justify-center p-0">
                                            <i class="fa fa-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between space-x-4">
                        <button id="clearManualBtn" class="btn bg-gray-700 text-white hover:bg-gray-600 flex-1">清空</button>
                        <button id="saveManualBtn" class="btn btn-primary flex-1">保存</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 导入历史卡片 -->
        <div class="card slide-in" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <i class="fa fa-history text-primary mr-2"></i>
                    <h2 class="text-lg font-semibold">盘点数据文件</h2>
                </div>
                <button id="refreshBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-3 px-4 text-left text-gray-400">导入时间</th>
                            <th class="py-3 px-4 text-left text-gray-400">文件名</th>
                            <th class="py-3 px-4 text-left text-gray-400">导入数量</th>
                            <th class="py-3 px-4 text-left text-gray-400">状态</th>
                            <th class="py-3 px-4 text-right text-gray-400">操作</th>
                        </tr>
                    </thead>
                    <tbody id="importHistoryTableBody">
                        <!-- 导入历史将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>



    <!-- 导入详情模态框 -->
    <div id="importDetailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">导入详情</h3>
                <button id="closeDetailModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <div id="importDetailContent" class="space-y-4">
                <!-- 详情内容将通过JavaScript动态生成 -->
            </div>
            <div class="mt-6 flex justify-end">
                <button id="closeDetailBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 菜单控制
        document.getElementById('menuBtn').addEventListener('click', function() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('hidden');
        });

        // 点击其他地方关闭菜单
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu');
            const menuBtn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        // 返回按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'inventory.html';
        });



        // 文件选择变化
        document.getElementById('batchFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('selectedFileName').textContent = file.name;
            } else {
                document.getElementById('selectedFileName').textContent = '未选择文件';
            }
        });

        // 取消按钮
        document.getElementById('cancelBtn').addEventListener('click', function() {
            window.location.href = 'inventory.html';
        });

        // 导入按钮
        document.getElementById('importBtn').addEventListener('click', function() {
            const file = document.getElementById('batchFile').files[0];
            if (!file) {
                alert('请选择文件');
                return;
            }
            
            // 验证文件格式
            if (!file.name.endsWith('.xlsx')) {
                alert('请选择.xlsx格式的Excel文件');
                return;
            }
            
            // 读取Excel文件
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 获取第一个工作表
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 解析工作表数据
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    // 验证表头
                    if (jsonData.length < 1) {
                        alert('文件中没有数据');
                        return;
                    }
                    
                    const header = jsonData[0];
                    if (!header || header.length < 3) {
                        alert('文件格式不正确，缺少必要的列');
                        return;
                    }
                    
                    // 验证数据
                    const importData = [];
                    const errors = [];
                    
                    for (let i = 1; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        if (!row || !row[0]) continue; // 跳过空行
                        
                        const code = row[0] || '';
                        const quantity = row[1];
                        const location = row[2] || '';
                        
                        // 验证必填字段
                        if (!code) {
                            errors.push(`第${i + 1}行：编码不能为空`);
                            continue;
                        }
                        
                        if (!location) {
                            errors.push(`第${i + 1}行：仓位不能为空`);
                            continue;
                        }
                        
                        // 验证数量
                        const quantityNum = parseFloat(quantity);
                        if (isNaN(quantityNum) || quantityNum < 0) {
                            errors.push(`第${i + 1}行：数量必须是非负数字`);
                            continue;
                        }
                        
                        importData.push({
                            code: code,
                            name: '',
                            quantity: quantityNum,
                            location: location
                        });
                    }
                    
                    // 显示错误信息
                    if (errors.length > 0) {
                        alert('导入过程中发现以下错误：\n' + errors.join('\n'));
                        return;
                    }
                    
                    if (importData.length === 0) {
                        alert('文件中没有有效的数据');
                        return;
                    }
                    
                    // 保存导入历史
                    saveImportHistory(file.name, importData);
                    
                    // 刷新导入历史列表
                    loadImportHistory();
                    

                    
                    // 重置文件选择
                    document.getElementById('batchFile').value = '';
                    document.getElementById('selectedFileName').textContent = '未选择文件';
                } catch (error) {
                    console.error('Error reading file:', error);
                    alert('文件读取失败，请检查文件格式是否正确');
                }
            };
            
            reader.onerror = function() {
                alert('文件读取失败，请检查文件格式');
            };
            
            reader.readAsArrayBuffer(file);
        });

        // 刷新按钮
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadImportHistory();
        });

        // 格式化时间函数
        function formatTime(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear().toString().slice(-2); // 获取年份的后两位
            const month = date.getMonth() + 1; // 月份从0开始，需要加1
            const day = date.getDate();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}`;
        }

        // 数据存储管理
        const StorageManager = {
            get: function(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (error) {
                    console.error('Error getting data from localStorage:', error);
                    return null;
                }
            },
            
            set: function(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (error) {
                    console.error('Error setting data to localStorage:', error);
                    return false;
                }
            }
        };

        // 保存导入历史
        function saveImportHistory(fileName, importData) {
            const importHistory = StorageManager.get('importHistory') || [];
            
            // 检查是否有活跃的手动录入记录
            if (fileName === '手动录入') {
                const activeManualEntry = importHistory.find(item => item.fileName === '手动录入' && item.active);
                if (activeManualEntry) {
                    // 将新数据添加到活跃的手动录入记录中
                    activeManualEntry.data = activeManualEntry.data.concat(importData);
                    activeManualEntry.count = activeManualEntry.data.length;
                    activeManualEntry.importTime = new Date().toLocaleString('zh-CN');
                    StorageManager.set('importHistory', importHistory);
                    return;
                }
            }
            
            // 创建新记录
            importHistory.push({
                id: 'IMP-' + Date.now().toString().slice(-6),
                fileName: fileName,
                importTime: new Date().toLocaleString('zh-CN'),
                count: importData.length,
                status: 'success',
                data: importData, // 存储详细数据
                active: false // 添加活跃状态字段
            });
            
            // 只保留最近10条记录
            if (importHistory.length > 10) {
                importHistory.shift();
            }
            
            StorageManager.set('importHistory', importHistory);
        }

        // 删除导入历史
        function deleteImportHistory(importId) {
            // 创建确认提醒窗口
            const confirmMessage = '确定要删除这条导入历史吗？\n此操作不可恢复。';
            
            // 显示确认对话框
            const result = confirm(confirmMessage);
            
            // 只有当用户点击确认时才执行删除操作
            if (result === true) {
                const importHistory = StorageManager.get('importHistory') || [];
                const updatedHistory = importHistory.filter(item => item.id !== importId);
                
                StorageManager.set('importHistory', updatedHistory);
                loadImportHistory();
                // 显示删除成功提醒
                alert('导入历史删除成功');
            }
            // 取消操作不显示提醒
        }

        // 查看导入详情
        function viewDetails(importId) {
            const importHistory = StorageManager.get('importHistory') || [];
            const importItem = importHistory.find(item => item.id === importId);
            
            if (!importItem) return;
            
            const detailContent = document.getElementById('importDetailContent');
            detailContent.innerHTML = `
                <div>
                    <p class="text-gray-400">导入时间: <span class="text-white">${formatTime(importItem.importTime)}</span></p>
                </div>
                <div>
                    <p class="text-gray-400">文件名: <span class="text-white">${importItem.fileName}</span></p>
                </div>
                <div>
                    <p class="text-gray-400">导入数量: <span class="text-white">${importItem.count}</span></p>
                </div>
                <div>
                    <p class="text-gray-400">状态: <span class="px-2 py-1 rounded-full text-xs font-medium bg-green-600/20 text-green-400">成功</span></p>
                </div>
                <div class="mt-4">
                    <h4 class="text-md font-semibold mb-2">导入数据</h4>
                    <div class="overflow-x-auto max-h-60">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-gray-700">
                                    <th class="py-2 px-3 text-left text-gray-400 text-xs">编码</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-xs">数量</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-xs">仓位</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${importItem.data.slice(0, 10).map(item => `
                                    <tr class="border-b border-gray-800 hover:bg-gray-800">
                                        <td class="py-2 px-3 text-sm">${item.code}</td>
                                        <td class="py-2 px-3 text-sm">${item.quantity}</td>
                                        <td class="py-2 px-3 text-sm">${item.location}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${importItem.data.length > 10 ? `<p class="text-xs text-gray-400 mt-2">显示前10条，共${importItem.data.length}条数据</p>` : ''}
                </div>
            `;
            
            // 显示模态框
            document.getElementById('importDetailModal').classList.remove('hidden');
        }

        // 加载导入历史
        function loadImportHistory() {
            const tableBody = document.getElementById('importHistoryTableBody');
            tableBody.innerHTML = '';
            
            const importHistory = StorageManager.get('importHistory') || [];
            
            // 如果没有数据，生成模拟数据
            if (importHistory.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `<td colspan="5" class="py-8 text-center text-gray-400">暂无导入历史</td>`;
                tableBody.appendChild(emptyRow);
                return;
            }
            
            importHistory.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-800';
                row.innerHTML = `
                    <td class="py-3 px-4">${formatTime(item.importTime)}</td>
                    <td class="py-3 px-4">${item.fileName}</td>
                    <td class="py-3 px-4">${item.count}</td>
                    <td class="py-3 px-4">
                        <span class="px-2 py-1 rounded-full text-xs font-medium bg-green-600/20 text-green-400">
                            成功
                        </span>
                    </td>
                    <td class="py-3 px-4 text-right">
                        <div class="flex justify-end space-x-3">
                            ${item.fileName === '手动录入' ? `
                                <button class="w-6 h-6 rounded-full bg-white text-black flex items-center justify-center cursor-pointer toggle-status-btn" data-id="${item.id}" title="切换状态">
                                </button>
                            ` : ''}
                            <button class="text-primary hover:text-blue-400 view-detail-btn" data-id="${item.id}" title="查看详情">
                                <i class="fa fa-eye"></i>
                            </button>
                            <button class="text-danger hover:text-red-400 delete-import-btn" data-id="${item.id}" title="删除">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            
            // 为所有查看详情按钮添加事件监听器
            document.querySelectorAll('.view-detail-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const importId = this.getAttribute('data-id');
                    viewDetails(importId);
                });
            });
            
            // 为所有删除按钮添加事件监听器
            document.querySelectorAll('.delete-import-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const importId = this.getAttribute('data-id');
                    deleteImportHistory(importId);
                });
            });
            
            // 为所有状态按钮添加事件监听器
            document.querySelectorAll('.toggle-status-btn').forEach(btn => {
                const importId = btn.getAttribute('data-id');
                const importHistory = StorageManager.get('importHistory') || [];
                const currentItem = importHistory.find(item => item.id === importId);
                
                // 初始化按钮状态
                if (currentItem && currentItem.active) {
                    btn.classList.remove('bg-white', 'text-black');
                    btn.classList.add('bg-green-500', 'text-white');
                } else {
                    btn.classList.remove('bg-green-500', 'text-white');
                    btn.classList.add('bg-white', 'text-black');
                }
                
                btn.addEventListener('click', function() {
                    const importId = this.getAttribute('data-id');
                    const importHistory = StorageManager.get('importHistory') || [];
                    
                    if (this.classList.contains('bg-white')) {
                        // 先将所有手动录入记录设置为非活跃
                        importHistory.forEach(item => {
                            if (item.fileName === '手动录入') {
                                item.active = false;
                            }
                        });
                        
                        // 将当前记录设置为活跃
                        const currentItem = importHistory.find(item => item.id === importId);
                        if (currentItem) {
                            currentItem.active = true;
                        }
                        
                        // 更新存储
                        StorageManager.set('importHistory', importHistory);
                        
                        // 更新按钮状态
                        this.classList.remove('bg-white', 'text-black');
                        this.classList.add('bg-green-500', 'text-white');
                        
                        // 重置其他按钮状态
                        document.querySelectorAll('.toggle-status-btn').forEach(otherBtn => {
                            if (otherBtn !== this) {
                                otherBtn.classList.remove('bg-green-500', 'text-white');
                                otherBtn.classList.add('bg-white', 'text-black');
                            }
                        });
                    } else {
                        // 将当前记录设置为非活跃
                        const currentItem = importHistory.find(item => item.id === importId);
                        if (currentItem) {
                            currentItem.active = false;
                        }
                        
                        // 更新存储
                        StorageManager.set('importHistory', importHistory);
                        
                        // 更新按钮状态
                        this.classList.remove('bg-green-500', 'text-white');
                        this.classList.add('bg-white', 'text-black');
                    }
                });
            });
        }



        // 标签页切换
        function initTabs() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.getAttribute('data-tab');
                    
                    // 切换标签按钮状态
                    tabBtns.forEach(b => {
                        b.classList.remove('border-primary', 'text-primary');
                        b.classList.add('border-transparent', 'text-gray-400');
                    });
                    this.classList.remove('border-transparent', 'text-gray-400');
                    this.classList.add('border-primary', 'text-primary');
                    
                    // 切换内容
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.add('hidden');
                    });
                    document.getElementById(`${tab}-tab`).classList.remove('hidden');
                });
            });
        }



        // 关闭导入详情模态框
        function closeImportDetailModal() {
            document.getElementById('importDetailModal').classList.add('hidden');
        }

        // 初始化加载
        document.addEventListener('DOMContentLoaded', function() {
            loadImportHistory();
            initTabs();
            
            // 为关闭按钮添加事件监听器
            document.getElementById('closeDetailModal').addEventListener('click', closeImportDetailModal);
            document.getElementById('closeDetailBtn').addEventListener('click', closeImportDetailModal);
            
            // 清空手动录入表单
            document.getElementById('clearManualBtn').addEventListener('click', function() {
                document.getElementById('manualLocation').value = '';
                document.getElementById('manualCode').value = '';
                document.getElementById('manualQuantity').value = '';
            });

            // 数量加减按钮事件监听器
            document.getElementById('decreaseManualQuantity').addEventListener('click', function() {
                const quantityInput = document.getElementById('manualQuantity');
                const currentValue = parseInt(quantityInput.value) || 0;
                quantityInput.value = currentValue - 1;
            });

            document.getElementById('increaseManualQuantity').addEventListener('click', function() {
                const quantityInput = document.getElementById('manualQuantity');
                const currentValue = parseInt(quantityInput.value) || 0;
                quantityInput.value = currentValue + 1;
            });

            // 保存手动录入数据
            document.getElementById('saveManualBtn').addEventListener('click', function() {
                const location = document.getElementById('manualLocation').value;
                const code = document.getElementById('manualCode').value;
                const quantity = document.getElementById('manualQuantity').value;
                
                if (!location || !code || !quantity) {
                    alert('请填写所有必填字段');
                    return;
                }
                
                // 创建手动录入数据数组（格式与文件导入一致）
                const manualData = [{
                    code: code,
                    name: '',
                    quantity: parseFloat(quantity),
                    location: location
                }];
                
                // 保存到导入历史
                saveImportHistory('手动录入', manualData);
                
                // 刷新导入历史列表
                loadImportHistory();
                
                // 清空表单
                document.getElementById('manualLocation').value = '';
                document.getElementById('manualCode').value = '';
                document.getElementById('manualQuantity').value = '';
            });
        });
    </script>
</body>
</html>
