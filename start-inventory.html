<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 开始盘点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6 transition-all duration-300 hover:shadow-lg hover:translate-y-[-2px];
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all duration-300 transform hover:scale-105 active:scale-95;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white transition-all duration-300;
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            .slide-in {
                animation: slideIn 0.3s ease-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes slideIn {
                from { transform: translateY(20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">YICHENGQIPEI</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="index.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">返回主页</a>
                        <a href="user-management.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">用户管理</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>

            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-2 pb-24">
        <!-- 页面标题 -->
        <div class="text-center mb-4">
            <h1 class="text-4xl font-bold py-2">开始盘点</h1>
        </div>

        <!-- 盘点信息卡片 -->
        <div class="flex space-x-4 mb-6">

            <button id="startInventoryBtn" class="btn btn-primary w-10 h-10 flex items-center justify-center p-0" title="盘点文件导入">
                <i class="fa fa-upload"></i>
            </button>
        </div>

        <!-- 手输盘点卡片 -->
        <div class="card mb-8 slide-in" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <i class="fa fa-pencil text-primary mr-2"></i>

                </div>
                <div class="flex items-center space-x-4">

                    <button id="viewInventoryFileBtn" class="btn bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 flex flex-col items-center justify-center p-0 text-xs" title="文件详情">
                        <div class="flex justify-between w-8">
                            <span>文</span>
                            <span>件</span>
                        </div>
                        <div class="flex justify-between w-8">
                            <span>详</span>
                            <span>情</span>
                        </div>
                    </button>
                    <button id="navBatchImportBtn" class="btn btn-secondary hover:bg-secondary/90 text-white w-10 h-10 flex flex-col items-center justify-center p-0 text-xs" title="数据导入">
                        <div class="flex justify-between w-8">
                            <span>数</span>
                            <span>据</span>
                        </div>
                        <div class="flex justify-between w-8">
                            <span>导</span>
                            <span>入</span>
                        </div>
                    </button>
                    <button id="cameraBtn" class="btn bg-purple-600 hover:bg-purple-500 text-white w-10 h-10 flex flex-col items-center justify-center p-0 text-xs" title="打开相机扫描">
                        <div class="flex justify-between w-8">
                            <span>相</span>
                            <span>机</span>
                        </div>

                            <span>扫</span>

                        </div>
                    </button>
                    <button id="completeInventoryBtn" class="btn bg-green-600 hover:bg-green-500 text-white w-10 h-10 flex flex-col items-center justify-center p-0 text-xs" title="完成盘点">

                            <span>完</span>
                            <span>成</span>

                            <span>点</span>

            </div>
            <div class="bg-gray-800 p-4 rounded-lg mb-6">

                        <input type="text" id="currentCode" class="input" placeholder="输入编码">

                    <div class="relative">

                        <div id="locationSuggestions" class="absolute z-10 w-full mt-1 bg-dark-card border border-gray-700 rounded-md shadow-lg hidden">

                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                        </label>
                    </div>
                    <button id="refreshCurrentInventoryBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">
                        <i class="fa fa-refresh"></i>
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">

                            <th class="py-3 px-4 text-left text-gray-400">编码</th>
                            <th class="py-3 px-4 text-left text-gray-400">仓位</th>
                            <th class="py-3 px-4 text-left text-gray-400">系统数量</th>
                            <th class="py-3 px-4 text-left text-gray-400">实际数量</th>
                            <th class="py-3 px-4 text-left text-gray-400">差异</th>
                            <th class="py-3 px-4 text-right text-gray-400">操作</th>
                        </tr>
                    </thead>
                    <tbody id="currentInventoryTableBody">

                    </tbody>
                </table>
            </div>
        </div>
    </main>



    <!-- 文件详情模态框 -->

                <button id="closeFileDetailsModal" class="text-gray-400 hover:text-white">

            </div>
            <div class="space-y-4" id="fileDetailsContent">
                <!-- 文件详情将通过JavaScript动态生成 -->
            </div>
            <div class="flex justify-end mt-6">
                <button id="closeFileDetailsBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">

    <!-- 相机扫描模态框 -->
    <div id="cameraModal" class="fixed inset-0 bg-black z-50 hidden">
        <!-- 顶部控制栏 -->
        <div class="absolute top-0 left-0 right-0 flex justify-between items-center p-4 z-10">

            </button>
            <h3 class="text-white font-semibold">配件标签扫描</h3>

            </button>
        </div>
        
        <!-- 模式切换 -->

        <!-- 相机预览 -->

            <!-- 取景框 -->

                <div class="w-4 h-4 border-t-2 border-r-2 border-white absolute top-0 right-0"></div>
                <div class="w-4 h-4 border-b-2 border-l-2 border-white absolute bottom-0 left-0"></div>
                <div class="w-4 h-4 border-b-2 border-r-2 border-white absolute bottom-0 right-0"></div>
            </div>
        </div>
        
        <!-- 底部控制栏 -->
        <div class="absolute bottom-0 left-0 right-0 flex justify-between items-center p-6 z-10">

                <button class="text-white hover:text-gray-300">1x</button>
                <button class="text-white hover:text-gray-300">2x</button>
                <button class="text-white hover:text-gray-300">3x</button>
                <button class="text-white hover:text-gray-300">5x</button>
            </div>
            
            <!-- 快门按钮 -->
            <button id="captureBtn" class="w-16 h-16 rounded-full border-4 border-white flex items-center justify-center">

                <input type="file" id="albumInput" accept="image/*" class="hidden">
                <button id="albumBtn" class="text-white hover:text-gray-300">
                    <i class="fa fa-image text-xl"></i>
                </button>
                <button id="cameraToggle" class="text-white hover:text-gray-300">

    <!-- 完成盘点确认模态框 -->
    <div id="completeInventoryModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">确认完成盘点</h3>
                <button id="closeCompleteInventoryModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <p class="mb-6">确定要完成当前盘点吗？完成后将无法继续添加数据。</p>
            <div class="flex justify-end space-x-4">
                <button id="cancelCompleteInventoryBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">取消</button>

            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">确认删除</h3>
                <button id="closeDeleteConfirmModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <p class="mb-6">确定要删除这条盘点记录吗？此操作不可恢复。</p>
            <div class="flex justify-end space-x-4">
                <button id="cancelDeleteBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">取消</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 数据存储管理
        const StorageManager = {
            get: function(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (error) {
                    console.error('Error getting data from localStorage:', error);
                    return null;
                }
            },
            
            set: function(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (error) {
                    console.error('Error setting data to localStorage:', error);
                    return false;
                }
            },
            
            init: function() {
                const storage = this.get('warehouseInventory');
                if (!storage) {
                    const initialData = {
                        version: '1.0',
                        lastUpdated: new Date().toISOString(),
                        inventories: {
                            current: null,
                            completed: []
                        },
                        statistics: {
                            totalItems: 0,
                            totalDifferences: 0,
                            accuracy: 0
                        }
                    };
                    this.set('warehouseInventory', initialData);
                } else {
                    // 确保completed字段存在
                    if (!storage.inventories.completed) {
                        storage.inventories.completed = [];
                        this.set('warehouseInventory', storage);
                    }
                }
            },
            
            saveCurrentInventory: function(inventoryData) {
                const storage = this.get('warehouseInventory');
                storage.inventories.current = inventoryData;
                storage.lastUpdated = new Date().toISOString();
                return this.set('warehouseInventory', storage);
            },
            
            saveCompletedInventory: function(inventoryData) {
                const storage = this.get('warehouseInventory');
                // 确保completed字段存在
                if (!storage.inventories.completed) {
                    storage.inventories.completed = [];
                }
                storage.inventories.completed.push(inventoryData);
                storage.lastUpdated = new Date().toISOString();
                return this.set('warehouseInventory', storage);
            }
        };

        // 加载当前盘点数据
        function loadCurrentInventory() {
            const tableBody = document.getElementById('currentInventoryTableBody');
            tableBody.innerHTML = '';
            
            const storage = StorageManager.get('warehouseInventory');
            const currentInventory = storage ? storage.inventories.current : null;
            
            if (!currentInventory || !currentInventory.items || currentInventory.items.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `<td colspan="6" class="py-8 text-center text-gray-400">暂无当前盘点数据</td>`;
                tableBody.appendChild(emptyRow);
                return;
            }
            
            // 筛选物品
            let filteredItems = currentInventory.items;
            if (!showAllItems) {
                // 默认只显示有差异的物品
                filteredItems = currentInventory.items.filter(item => {
                    const difference = item.difference || 0;
                    return difference !== 0;
                });
            }
            
            if (filteredItems.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `<td colspan="6" class="py-8 text-center text-gray-400">${showAllItems ? '暂无当前盘点数据' : '暂无有差异的盘点数据'}</td>`;
                tableBody.appendChild(emptyRow);
                return;
            }
            
            filteredItems.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-800';
                
                // 计算差异颜色
                const difference = item.difference || 0;
                const differenceClass = difference > 0 ? 'text-green-400' : difference < 0 ? 'text-red-400' : 'text-gray-400';
                const differenceText = difference > 0 ? '+' + difference : difference;
                
                row.innerHTML = `
                    <td class="py-3 px-4">${item.code || ''}</td>
                    <td class="py-3 px-4">${item.location}</td>
                    <td class="py-3 px-4">${item.systemQuantity || 0}</td>
                    <td class="py-3 px-4">${item.actualQuantity}</td>
                    <td class="py-3 px-4 ${differenceClass}">${differenceText}</td>
                    <td class="py-3 px-4 text-right">
                        <button class="text-danger hover:text-red-400 delete-item-btn" data-index="${index}">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            
            // 为删除按钮添加事件监听器
            document.querySelectorAll('.delete-item-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    showDeleteConfirm(index);
                });
            });
        }

        // 格式化时间函数
        function formatTime(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear().toString().slice(-2); // 获取年份的后两位
            const month = date.getMonth() + 1; // 月份从0开始，需要加1
            const day = date.getDate();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}`;
        }

        // 全局变量
        let showAllItems = true; // 是否显示所有条目
        let itemToDelete = -1; // 存储要删除的项目索引
        let statusButtonCount = 0; // 状态按钮计数

        // 计算系统数量总数
        function calculateSystemQuantityTotal(items) {
            if (!items || items.length === 0) {
                return 0;
            }
            return items.reduce((total, item) => {
                return total + (parseInt(item.systemQuantity) || 0);
            }, 0);
        }

        // 计算正数差异的总和
        function calculatePositiveDifferencesTotal(items) {
            if (!items || items.length === 0) {
                return 0;
            }
            return items.reduce((total, item) => {
                const difference = parseInt(item.difference) || 0;
                return total + (difference > 0 ? difference : 0);
            }, 0);
        }

        // 状态按钮颜色循环变化函数
        function toggleStatusButton(button) {
            statusButtonCount++;
            switch(statusButtonCount % 3) {
                case 1:

            async function startCamera() {
                try {
                    const constraints = {
                        video: {

                        }
                    };
                    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                    const video = document.getElementById('cameraVideo');
                    video.srcObject = cameraStream;

                const lines = wordsResult.map(item => item.words.trim()).filter(line => line !== '');
                
                if (mode === 'specific') {
                    // 模式一：特定标签识别
                    // 提取第1行和第4行内容
                    if (lines.length >= 4) {
                        result.code = lines[0];
                        result.location = lines[3];
                    } else if (lines.length >= 1) {
                        // 如果行数不足，至少取第一行作为编码
                        result.code = lines[0];
                    }
                } else {
                    // 模式二：通用 OE 号识别
                    // 正则表达式匹配OE号
                    const oePattern = /\d{5,}-\w{3,}-\w{3,}/g;
                    let bestOE = null;
                    
                    lines.forEach(line => {
                        const matches = line.match(oePattern);
                        if (matches && matches.length > 0) {
                            bestOE = matches[0];
                        }
                    });
                    
                    if (bestOE) {
                        result.code = bestOE;
                    } else if (lines.length > 0) {
                        // 如果没有找到 OE 号，取第一行
                        result.code = lines[0];
                    }
                }
                
                return result;
            }

            // 从相册选择图像
            function handleAlbumSelect(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        // 显示识别中提示
                        document.getElementById('recognizingOverlay').classList.remove('hidden');
                        
                        try {
                            // 转换为Base64
                            const base64 = e.target.result.split(',')[1];
                            
                            // 获取access_token
                            const accessToken = await getAccessToken();

                            // 调用OCR API
                            const response = await fetch(`${OCR_URL}?access_token=${accessToken}`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/x-www-form-urlencoded'
                                },
                                body: `image=${encodeURIComponent(base64)}`
                            });

                            const data = await response.json();

                            if (data.words_result) {
                                // 处理识别结果
                                let ocrResult = processOCRResult(data.words_result, currentOCRMode);
                                
                                // 填充识别结果到表单
                                document.getElementById('currentCode').value = ocrResult.code || '';
                                document.getElementById('currentLocation').value = ocrResult.location || '';
                                document.getElementById('actualQuantity').value = ocrResult.quantity || '1';
                                
                                alert('识别成功，已自动填充编码与仓位');
                            } else {
                                alert('识别失败，请重新拍摄或上传清晰图片');
                            }
                        } catch (error) {
                            console.error('OCR 识别错误:', error);
                            alert('网络异常，请检查网络连接后重试');
                        } finally {
                            document.getElementById('recognizingOverlay').classList.add('hidden');
                            closeOCR();
                        }
                    };
                    reader.readAsDataURL(file);
                }
            }

            // 模式切换
            document.getElementById('modeSpecific').addEventListener('click', function() {
                currentOCRMode = 'specific';
                this.classList.remove('bg-gray-700');
                this.classList.add('bg-primary');
                document.getElementById('modeGeneral').classList.remove('bg-primary');
                document.getElementById('modeGeneral').classList.add('bg-gray-700');
            });

            document.getElementById('modeGeneral').addEventListener('click', function() {
                currentOCRMode = 'general';
                this.classList.remove('bg-gray-700');
                this.classList.add('bg-primary');
                document.getElementById('modeSpecific').classList.remove('bg-primary');
                document.getElementById('modeSpecific').classList.add('bg-gray-700');
            });

            // 相机相关事件监听器
            document.getElementById('closeCameraModal').addEventListener('click', closeOCR);
            document.getElementById('captureBtn').addEventListener('click', performOCR);
            document.getElementById('cameraToggle').addEventListener('click', toggleCamera);
            document.getElementById('flashToggle').addEventListener('click', toggleFlash);
            document.getElementById('albumBtn').addEventListener('click', function() {
                document.getElementById('albumInput').click();
            });
            document.getElementById('albumInput').addEventListener('change', handleAlbumSelect);

            // 更新相机按钮事件监听器
            document.getElementById('cameraBtn').addEventListener('click', openOCR);
            
            // 数量加减按钮功能
            const actualQuantityInput = document.getElementById('actualQuantity');
            const increaseQuantityBtn = document.getElementById('increaseQuantity');
            const decreaseQuantityBtn = document.getElementById('decreaseQuantity');
            
            increaseQuantityBtn.addEventListener('click', function() {
                const currentValue = parseInt(actualQuantityInput.value) || 0;
                actualQuantityInput.value = currentValue + 1;
            });
            
            decreaseQuantityBtn.addEventListener('click', function() {
                const currentValue = parseInt(actualQuantityInput.value) || 0;
                actualQuantityInput.value = currentValue - 1;
            });

            // 编码自动补全功能
            const currentCodeInput = document.getElementById('currentCode');
            const codeSuggestions = document.getElementById('codeSuggestions');
            
            // 仓位自动补全功能
            const currentLocationInput = document.getElementById('currentLocation');
            const locationSuggestions = document.getElementById('locationSuggestions');
            
            // 获取当前导入文件的编码
            function getAllCodes() {
                const storage = StorageManager.get('warehouseInventory');
                const currentInventory = storage ? storage.inventories.current : null;
                
                // 如果没有当前盘点或没有文件ID，返回空数组
                if (!currentInventory || !currentInventory.fileId) {
                    return [];
                }
                
                // 只获取当前导入文件的编码
                const importHistory = StorageManager.get('importHistory') || [];
                const currentFile = importHistory.find(file => file.id === currentInventory.fileId);
                
                if (!currentFile || !currentFile.data) {
                    return [];
                }
                
                const codes = new Set();
                currentFile.data.forEach(item => {
                    if (item.code) {
                        codes.add(item.code);
                    }
                });
                
                return Array.from(codes);
            }
            
            // 获取当前导入文件的仓位
            function getAllLocations() {
                const storage = StorageManager.get('warehouseInventory');
                const currentInventory = storage ? storage.inventories.current : null;
                
                // 如果没有当前盘点或没有文件ID，返回空数组
                if (!currentInventory || !currentInventory.fileId) {
                    return [];
                }
                
                // 只获取当前导入文件的仓位
                const importHistory = StorageManager.get('importHistory') || [];
                const currentFile = importHistory.find(file => file.id === currentInventory.fileId);
                
                if (!currentFile || !currentFile.data) {
                    return [];
                }
                
                const locations = new Set();
                currentFile.data.forEach(item => {
                    if (item.location) {
                        locations.add(item.location);
                    }
                });
                
                return Array.from(locations);
            }
            
            // 显示编码建议
            function showCodeSuggestions(inputValue) {
                if (!inputValue.trim()) {
                    codeSuggestions.classList.add('hidden');
                    return;
                }
                
                const allCodes = getAllCodes();
                const filteredCodes = allCodes.filter(code => 
                    code.toLowerCase().includes(inputValue.toLowerCase())
                );
                
                if (filteredCodes.length === 0) {
                    codeSuggestions.classList.add('hidden');
                    return;
                }
                
                // 生成建议列表
                codeSuggestions.innerHTML = '';
                filteredCodes.forEach(code => {
                    const suggestionItem = document.createElement('div');
                    suggestionItem.className = 'px-4 py-2 hover:bg-gray-700 cursor-pointer';
                    suggestionItem.textContent = code;
                    suggestionItem.addEventListener('click', function() {
                        currentCodeInput.value = code;
                        codeSuggestions.classList.add('hidden');
                    });
                    codeSuggestions.appendChild(suggestionItem);
                });
                
                codeSuggestions.classList.remove('hidden');
            }
            
            // 显示仓位建议
            function showLocationSuggestions(inputValue) {
                if (!inputValue.trim()) {
                    locationSuggestions.classList.add('hidden');
                    return;
                }
                
                const allLocations = getAllLocations();
                const filteredLocations = allLocations.filter(location => 
                    location.toLowerCase().includes(inputValue.toLowerCase())
                );
                
                if (filteredLocations.length === 0) {
                    locationSuggestions.classList.add('hidden');
                    return;
                }
                
                // 生成建议列表
                locationSuggestions.innerHTML = '';
                filteredLocations.forEach(location => {
                    const suggestionItem = document.createElement('div');
                    suggestionItem.className = 'px-4 py-2 hover:bg-gray-700 cursor-pointer';
                    suggestionItem.textContent = location;
                    suggestionItem.addEventListener('click', function() {
                        currentLocationInput.value = location;
                        locationSuggestions.classList.add('hidden');
                    });
                    locationSuggestions.appendChild(suggestionItem);
                });
                
                locationSuggestions.classList.remove('hidden');
            }
            
            // 监听编码输入
            currentCodeInput.addEventListener('input', function() {
                showCodeSuggestions(this.value);
            });
            
            // 监听仓位输入
            currentLocationInput.addEventListener('input', function() {
                showLocationSuggestions(this.value);
            });
            
            // 点击其他地方关闭建议列表
            document.addEventListener('click', function(e) {
                if (!currentCodeInput.contains(e.target) && !codeSuggestions.contains(e.target)) {
                    codeSuggestions.classList.add('hidden');
                }
                if (!currentLocationInput.contains(e.target) && !locationSuggestions.contains(e.target)) {
                    locationSuggestions.classList.add('hidden');
                }
            });
            
            // 加载当前盘点数据
            loadCurrentInventory();
        });
        
        // 加载文件盘点数据
        function loadFileInventory(fileId) {
            const files = StorageManager.get('importHistory') || [];
            const file = files.find(f => f.id === fileId);
            
            if (!file) return;
            
            // 创建基于文件的盘点数据
            const inventoryData = {
                id: 'INV-' + Date.now().toString().slice(-6),
                code: '',
                name: file.fileName,
                location: '文件导入',
                scope: 'file',
                fileId: fileId,
                startTime: new Date().toLocaleString('zh-CN'),
                status: 'in_progress',
                progress: 0,
                items: []
            };
            
            // 保存到当前盘点
            StorageManager.saveCurrentInventory(inventoryData);
            
            // 显示文件信息
            document.getElementById('inventoryDataInfo').value = `${formatTime(file.importTime)} ${file.fileName} 导入数量 ${file.count}`;
            // 加载当前盘点数据
            loadCurrentInventory();
        }
        
        // 根据编码获取物品信息
        function getItemByCode(code) {
            const storage = StorageManager.get('warehouseInventory');
            const currentInventory = storage ? storage.inventories.current : null;
            
            // 如果没有当前盘点或没有文件ID，返回null
            if (!currentInventory || !currentInventory.fileId) {
                return null;
            }
            
            // 只从当前导入文件中查找物品信息
            const importHistory = StorageManager.get('importHistory') || [];
            const currentFile = importHistory.find(file => file.id === currentInventory.fileId);
            
            if (!currentFile || !currentFile.data) {
                return null;
            }
            
            // 在当前文件中查找编码匹配的物品
            const item = currentFile.data.find(item => item.code === code);
            if (item) {
                return item;
            }
            
            // 未找到返回null
            return null;
        }
        
        // 获取系统库存数量（只从当前导入文件中获取）
        function getSystemQuantity(location, code) {
            const storage = StorageManager.get('warehouseInventory');
            const currentInventory = storage ? storage.inventories.current : null;
            
            // 如果没有当前盘点或没有文件ID，返回0
            if (!currentInventory || !currentInventory.fileId) {
                return 0;
            }
            
            // 只从当前导入文件中查找系统库存数据
            const importHistory = StorageManager.get('importHistory') || [];
            const currentFile = importHistory.find(file => file.id === currentInventory.fileId);
            
            if (!currentFile || !currentFile.data) {
                return 0;
            }
            
            // 在当前文件中查找编码和仓位匹配的物品
            const item = currentFile.data.find(item => item.code === code && item.location === location);
            if (item) {
                return item.quantity || 0;
            }
            
            // 未找到返回0
            return 0;
        }
        
        // 计算差异
        function calculateDifference(actualQuantity, systemQuantity) {
            return parseInt(actualQuantity) - parseInt(systemQuantity);
        }
        
        // 数据同步：将本次录入的信息推送到仓库盘点的主数据库
        function syncInventoryData(inventoryData) {
            // 获取主数据库
            const storage = StorageManager.get('warehouseInventory') || {
                version: '1.0',
                lastUpdated: new Date().toISOString(),
                inventories: {
                    current: null
                },
                statistics: {
                    totalItems: 0,
                    totalDifferences: 0,
                    accuracy: 0
                }
            };
            
            // 确保统计信息存在
            if (!storage.statistics) {
                storage.statistics = {
                    totalItems: 0,
                    totalDifferences: 0,
                    accuracy: 0
                };
            }
            
            // 更新统计信息
            storage.statistics.totalItems += inventoryData.totalItems || 0;
            
            // 计算差异数量
            const differenceCount = inventoryData.items.filter(item => item.difference !== 0).length;
            storage.statistics.totalDifferences += differenceCount;
            
            // 计算准确率
            const totalItems = storage.statistics.totalItems;
            if (totalItems > 0) {
                const accurateItems = totalItems - storage.statistics.totalDifferences;
                storage.statistics.accuracy = Math.round((accurateItems / totalItems) * 100);
            }
            
            // 更新最后更新时间
            storage.lastUpdated = new Date().toISOString();
            
            // 保存到存储
            StorageManager.set('warehouseInventory', storage);
        }
    </script>
