<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 盘点系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6 transition-all duration-300 hover:shadow-lg hover:translate-y-[-2px];
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all duration-300 transform hover:scale-105 active:scale-95;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white transition-all duration-300;
            }
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            .slide-in {
                animation: slideIn 0.3s ease-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes slideIn {
                from { transform: translateY(20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">YICHENGQIPEI</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="index.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">返回主页</a>
                        <a href="user-management.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">用户管理</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">仓库盘点</h1>
        </div>

        <!-- 数据概览卡片 -->
        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="card slide-in" style="animation-delay: 0.1s;">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold">库存准确率</h3>
                    <i class="fa fa-check-circle text-secondary text-xl"></i>
                </div>
                <p class="text-3xl font-bold" id="inventoryAccuracy">0%</p>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden mt-2">
                    <div class="h-full bg-primary transition-all duration-300" id="accuracyProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 盘点已完成列表 -->
        <div class="card slide-in" style="animation-delay: 0.4s;">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <i class="fa fa-check-circle text-secondary mr-2"></i>
                    <h2 class="text-lg font-semibold">盘点已完成列表</h2>
                </div>
                <button id="refreshCompletedBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-3 px-4 text-left text-gray-400">
                                <div class="flex flex-col items-center">
                                    <span>完成</span>
                                    <span>时间</span>
                                </div>
                            </th>
                            <th class="py-3 px-4 text-left text-gray-400">名称</th>
                            <th class="py-3 px-4 text-left text-gray-400">
                                <div class="flex flex-col items-center">
                                    <span>系统</span>
                                    <span>数量</span>
                                </div>
                            </th>
                            <th class="py-3 px-4 text-left text-gray-400">差异</th>
                            <th class="py-3 px-4 text-left text-gray-400">操作</th>
                        </tr>
                    </thead>
                    <tbody id="completedInventoryTableBody">
                        <!-- 盘点已完成列表将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>




    </main>

    <!-- 底部导航栏 -->
    <footer class="bg-dark fixed bottom-0 left-0 right-0 border-t border-gray-800 z-10">
        <div class="container mx-auto px-4 py-3">
            <div class="flex space-x-4">
                <button id="navBatchImportBtn" class="btn btn-secondary flex-1">
                    <i class="fa fa-upload mr-2"></i>数据导入
                </button>
                <button id="navStartInventoryBtn" class="btn btn-primary flex-1">
                    <i class="fa fa-play-circle mr-2"></i>开始盘点
                </button>
            </div>
        </div>
    </footer>

    <!-- 盘点详情模态框 -->
    <div id="inventoryDetailModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">盘点详情</h3>
                <button id="closeInventoryDetailModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <div id="inventoryDetailContent" class="space-y-4">
                <!-- 详情内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">确认删除</h3>
                <button id="closeDeleteConfirmModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <p class="mb-6">确定要删除这条盘点记录吗？此操作不可恢复。</p>
            <div class="flex justify-end space-x-4">
                <button id="cancelDeleteBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">取消</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">删除</button>
            </div>
        </div>
    </div>



    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 数据存储管理
        const StorageManager = {
            get: function(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (error) {
                    console.error('Error getting data from localStorage:', error);
                    return null;
                }
            },
            
            set: function(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (error) {
                    console.error('Error setting data to localStorage:', error);
                    return false;
                }
            },
            
            init: function() {
                const storage = this.get('warehouseInventory');
                if (!storage) {
                    const initialData = {
                        version: '1.0',
                        lastUpdated: new Date().toISOString(),
                        inventories: {
                            current: null,
                            completed: []
                        },
                        statistics: {
                            totalItems: 0,
                            totalDifferences: 0,
                            accuracy: 0
                        }
                    };
                    this.set('warehouseInventory', initialData);
                } else {
                    // 确保completed字段存在
                    if (!storage.inventories.completed) {
                        storage.inventories.completed = [];
                        this.set('warehouseInventory', storage);
                    }
                }
            },
            
            saveCurrentInventory: function(inventoryData) {
                const storage = this.get('warehouseInventory');
                storage.inventories.current = inventoryData;
                storage.lastUpdated = new Date().toISOString();
                return this.set('warehouseInventory', storage);
            },
            
            saveCompletedInventory: function(inventoryData) {
                const storage = this.get('warehouseInventory');
                storage.inventories.completed.push(inventoryData);
                storage.lastUpdated = new Date().toISOString();
                return this.set('warehouseInventory', storage);
            },
            
            getInventoryById: function(id) {
                const storage = this.get('warehouseInventory');
                if (!storage) return null;
                
                // 从已完成盘点中查找
                return storage.inventories.completed.find(item => item.id === id) || null;
            }
            

        };



        // 更新仪表盘统计数据
        function updateDashboardStats() {
            const storage = StorageManager.get('warehouseInventory');
            
            if (!storage) {
                document.getElementById('inventoryAccuracy').textContent = '0%';
                document.getElementById('accuracyProgress').style.width = '0%';
                return;
            }
            
            // 获取统计信息
            const statistics = storage.statistics || {
                totalItems: 0,
                totalDifferences: 0,
                accuracy: 0
            };
            
            const accuracy = statistics.accuracy || 0;
            
            document.getElementById('inventoryAccuracy').textContent = `${accuracy}%`;
            document.getElementById('accuracyProgress').style.width = `${accuracy}%`;
        }

        // 加载已完成盘点列表
        function loadCompletedInventoryList() {
            const tableBody = document.getElementById('completedInventoryTableBody');
            tableBody.innerHTML = '';
            
            const storage = StorageManager.get('warehouseInventory');
            const completedInventory = storage ? storage.inventories.completed : [];
            
            if (completedInventory.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `<td colspan="6" class="py-8 text-center text-gray-400">暂无已完成的盘点记录</td>`;
                tableBody.appendChild(emptyRow);
                return;
            }
            
            const recentInventory = completedInventory.slice(-10).reverse();
            
            recentInventory.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-800';
                
                row.innerHTML = `
                    <td class="py-3 px-4">${formatTime(item.endTime || item.startTime)}</td>
                    <td class="py-3 px-4">${item.name}</td>
                    <td class="py-3 px-4">${calculateSystemQuantityTotal(item.items)}</td>
                    <td class="py-3 px-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-green-400">+${calculatePositiveDifferencesTotal(item.items)}</span>
                            <span class="text-red-400">-${calculateNegativeDifferencesTotal(item.items)}</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right">
                        <div class="flex justify-end space-x-3">
                            <button class="text-primary hover:text-blue-400" onclick="viewInventoryDetail('${item.id}')" title="查看详情">
                                <i class="fa fa-eye"></i>
                            </button>
                            <button class="text-danger hover:text-red-400" onclick="deleteCompletedInventory('${item.id}')" title="删除">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 格式化时间函数
        function formatTime(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear().toString().slice(-2); // 获取年份的后两位
            const month = date.getMonth() + 1; // 月份从0开始，需要加1
            const day = date.getDate();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}`;
        }

        // 存储要删除的盘点记录ID
        let inventoryToDelete = null;

        // 删除已完成的盘点记录
        function deleteCompletedInventory(id) {
            inventoryToDelete = id;
            document.getElementById('deleteConfirmModal').classList.remove('hidden');
        }

        // 执行删除操作
        function performDelete() {
            if (inventoryToDelete) {
                const storage = StorageManager.get('warehouseInventory');
                if (storage && storage.inventories && storage.inventories.completed) {
                    // 从已完成盘点中删除指定的记录
                    storage.inventories.completed = storage.inventories.completed.filter(item => item.id !== inventoryToDelete);
                    
                    // 更新统计信息
                    let totalItems = 0;
                    let totalDifferences = 0;
                    
                    storage.inventories.completed.forEach(inventory => {
                        totalItems += inventory.totalItems || 0;
                        totalDifferences += inventory.differences || 0;
                    });
                    
                    storage.statistics.totalItems = totalItems;
                    storage.statistics.totalDifferences = totalDifferences;
                    
                    // 计算准确率
                    if (totalItems > 0) {
                        const accurateItems = totalItems - totalDifferences;
                        storage.statistics.accuracy = Math.round((accurateItems / totalItems) * 100);
                    } else {
                        storage.statistics.accuracy = 0;
                    }
                    
                    // 更新最后更新时间
                    storage.lastUpdated = new Date().toISOString();
                    
                    // 保存到存储
                    StorageManager.set('warehouseInventory', storage);
                    
                    // 重新加载盘点已完成列表
                    loadCompletedInventoryList();
                    updateDashboardStats();
                }
                
                // 重置要删除的ID
                inventoryToDelete = null;
                
                // 关闭模态框
                document.getElementById('deleteConfirmModal').classList.add('hidden');
            }
        }

        // 取消删除操作
        function cancelDelete() {
            inventoryToDelete = null;
            document.getElementById('deleteConfirmModal').classList.add('hidden');
        }

        // 查看盘点详情
        function viewInventoryDetail(id) {
            const inventory = StorageManager.getInventoryById(id);
            if (!inventory) {
                alert('未找到盘点记录');
                return;
            }

            const detailContent = document.getElementById('inventoryDetailContent');
            detailContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-md font-semibold mb-2">基本信息</h4>
                        <div class="space-y-2">
                            <div class="flex justify-between">
                                <span class="text-gray-400">完成时间</span>
                                <span>${formatTime(inventory.endTime || inventory.startTime)}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">名称</span>
                                <span>${inventory.name}</span>
                            </div>

                            <div class="flex justify-between">
                                <span class="text-gray-400">系统数量总数</span>
                                <span>${calculateSystemQuantityTotal(inventory.items)}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">差异</span>
                                <div class="flex items-center space-x-4">
                                    <span class="text-green-400">+${calculatePositiveDifferencesTotal(inventory.items)}</span>
                                    <span class="text-red-400">-${calculateNegativeDifferencesTotal(inventory.items)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6">
                    <h4 class="text-md font-semibold mb-3">盘点明细</h4>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-gray-700">
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">编码</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">仓位</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">系统数量</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">实际数量</th>
                                    <th class="py-2 px-3 text-left text-gray-400 text-sm">差异</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${inventory.items && inventory.items.length > 0 ? inventory.items.map(item => {
                                    const difference = parseInt(item.actualQuantity) - parseInt(item.systemQuantity);
                                    const isUnInventoried = item.status === 'uninventoried';
                                    return `
                                        <tr class="border-b border-gray-700 hover:bg-gray-800 cursor-pointer">
                                            <td class="py-2 px-3 text-sm">${item.code || ''}</td>
                                            <td class="py-2 px-3 text-sm">${item.location}</td>
                                            <td class="py-2 px-3 text-sm">${item.systemQuantity || 0}</td>
                                            <td class="py-2 px-3 text-sm">${item.actualQuantity}</td>
                                            <td class="py-2 px-3 text-sm ${isUnInventoried ? 'font-bold text-red-400' : difference > 0 ? 'text-green-400' : difference < 0 ? 'text-red-400' : 'text-gray-400'}">
                                                <div class="flex items-center justify-between">
                                                    <span>${difference > 0 ? '+' + difference : difference}</span>
                                                    <button class="w-6 h-6 rounded-full bg-white text-black flex items-center justify-center cursor-pointer ml-2" onclick="toggleStatusButton(this)"></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('') : `<tr><td colspan="5" class="py-4 text-center text-gray-400">暂无盘点明细</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('inventoryDetailModal').classList.remove('hidden');
            
            // 为表格行添加点击事件，实现单选效果
            setTimeout(function() {
                document.querySelectorAll('#inventoryDetailContent table tbody tr').forEach(row => {
                    row.addEventListener('click', function() {
                        // 移除所有行的黄色背景
                        const allRows = this.parentElement.querySelectorAll('tr');
                        allRows.forEach(r => r.classList.remove('bg-yellow-900/30'));
                        // 为当前行添加黄色背景
                        this.classList.add('bg-yellow-900/30');
                    });
                });
            }, 100);
        }

        // 计算系统数量总数
        function calculateSystemQuantityTotal(items) {
            if (!items || items.length === 0) {
                return 0;
            }
            return items.reduce((total, item) => {
                return total + (parseInt(item.systemQuantity) || 0);
            }, 0);
        }

        // 计算负数差异的总和
        function calculateNegativeDifferencesTotal(items) {
            if (!items || items.length === 0) {
                return 0;
            }
            return items.reduce((total, item) => {
                const difference = parseInt(item.difference) || 0;
                return total + (difference < 0 ? Math.abs(difference) : 0);
            }, 0);
        }

        // 计算正数差异的总和
        function calculatePositiveDifferencesTotal(items) {
            if (!items || items.length === 0) {
                return 0;
            }
            return items.reduce((total, item) => {
                const difference = parseInt(item.difference) || 0;
                return total + (difference > 0 ? difference : 0);
            }, 0);
        }

        // 状态按钮颜色循环变化函数
        let statusButtonCount = 0;
        function toggleStatusButton(button) {
            statusButtonCount++;
            switch(statusButtonCount % 3) {
                case 1:
                    button.classList.remove('bg-white', 'text-black');
                    button.classList.add('bg-green-500', 'text-white');
                    button.innerHTML = '<i class="fa fa-check text-xs"></i>';
                    break;
                case 2:
                    button.classList.remove('bg-green-500', 'text-white');
                    button.classList.add('bg-red-500', 'text-white');
                    button.innerHTML = '<i class="fa fa-times text-xs"></i>';
                    break;
                case 0:
                    button.classList.remove('bg-red-500', 'text-white');
                    button.classList.add('bg-white', 'text-black');
                    button.innerHTML = '';
                    break;
            }
        }

        // 初始化加载
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化存储结构
            StorageManager.init();
            
            // 菜单控制
            document.getElementById('menuBtn').addEventListener('click', function() {
                const menu = document.getElementById('menu');
                menu.classList.toggle('hidden');
            });

            // 点击其他地方关闭菜单
            document.addEventListener('click', function(e) {
                const menu = document.getElementById('menu');
                const menuBtn = document.getElementById('menuBtn');
                if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                    menu.classList.add('hidden');
                }
            });

            // 返回按钮
            document.getElementById('backBtn').addEventListener('click', function() {
                window.location.href = 'index.html';
            });

            // 底部导航栏开始盘点按钮
            document.getElementById('navStartInventoryBtn').addEventListener('click', function() {
                window.location.href = 'start-inventory.html';
            });

            // 底部导航栏数据导入按钮
            document.getElementById('navBatchImportBtn').addEventListener('click', function() {
                window.location.href = 'batch-import.html';
            });

            // 关闭盘点详情模态框
            document.getElementById('closeInventoryDetailModal').addEventListener('click', function() {
                document.getElementById('inventoryDetailModal').classList.add('hidden');
            });

            // 刷新已完成盘点列表按钮
            document.getElementById('refreshCompletedBtn').addEventListener('click', function() {
                loadCompletedInventoryList();
            });

            // 删除确认模态框按钮
            document.getElementById('confirmDeleteBtn').addEventListener('click', performDelete);
            document.getElementById('cancelDeleteBtn').addEventListener('click', cancelDelete);
            document.getElementById('closeDeleteConfirmModal').addEventListener('click', cancelDelete);
            
            // 加载数据
            loadCompletedInventoryList();
            updateDashboardStats();
        });
    </script>
</body>
