<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 用户管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
            .role-badge {
                @apply px-3 py-1 rounded-full text-xs font-medium;
            }
            .role-admin {
                @apply bg-primary/20 text-primary;
            }
            .role-user {
                @apply bg-secondary/20 text-secondary;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">用户管理</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="index.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">返回主页</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">用户管理</h1>
            <p class="text-gray-400">管理系统用户账户和权限</p>
            <div class="w-24 h-1 bg-primary mx-auto mt-4"></div>
        </div>

        <!-- 添加用户按钮 -->
        <div class="mb-6 text-right">
            <button id="addUserBtn" class="btn btn-primary">
                <i class="fa fa-plus mr-2"></i>添加用户
            </button>
        </div>

        <!-- 用户列表 -->
        <div class="card">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-4 px-6 text-left text-gray-400 font-medium">用户名</th>
                            <th class="py-4 px-6 text-left text-gray-400 font-medium">角色</th>
                            <th class="py-4 px-6 text-left text-gray-400 font-medium">创建时间</th>
                            <th class="py-4 px-6 text-right text-gray-400 font-medium">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 添加/编辑用户模态框 -->
    <div id="userModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold" id="modalTitle">添加用户</h3>
                <button id="closeModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <form id="userForm" class="space-y-4">
                <input type="hidden" id="userId">
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">用户名</label>
                    <input type="text" id="username" class="input" placeholder="输入用户名" required>
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">密码</label>
                    <div class="relative">
                        <input type="password" id="password" class="input pr-10" placeholder="输入密码" required>
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">角色</label>
                    <select id="role" class="input" required>
                        <option value="admin">管理员</option>
                        <option value="user">普通用户</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancelBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        if (currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 菜单控制
        document.getElementById('menuBtn').addEventListener('click', function() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('hidden');
        });

        // 点击其他地方关闭菜单
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu');
            const menuBtn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        // 返回按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 加载用户数据
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const tableBody = document.getElementById('userTableBody');
            
            tableBody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-800';
                
                // 格式化创建时间（如果没有则使用当前时间）
                const createdAt = user.createdAt || new Date().toLocaleString('zh-CN');
                
                // 检查是否为默认用户
                const isDefault = user.id === 1 || user.isDefault;
                
                row.innerHTML = `
                    <td class="py-4 px-6">
                        ${user.username}
                        ${isDefault ? '<span class="ml-2 px-2 py-0.5 rounded-full text-xs font-medium bg-blue-600/20 text-blue-400">默认</span>' : ''}
                    </td>
                    <td class="py-4 px-6">
                        <span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">
                            ${user.role === 'admin' ? '管理员' : '普通用户'}
                        </span>
                    </td>
                    <td class="py-4 px-6 text-gray-400">${createdAt}</td>
                    <td class="py-4 px-6 text-right">
                        <button class="text-primary hover:underline mr-4" onclick="editUser(${user.id})">
                            <i class="fa fa-edit"></i>
                        </button>
                        ${user.id !== 1 ? `
                            <button class="text-danger hover:underline" onclick="deleteUser(${user.id})">
                                <i class="fa fa-trash"></i>
                            </button>
                        ` : ''}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 打开添加用户模态框
        document.getElementById('addUserBtn').addEventListener('click', function() {
            document.getElementById('modalTitle').textContent = '添加用户';
            document.getElementById('userId').value = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('role').value = 'admin';
            
            // 启用所有输入字段
            const inputFields = document.querySelectorAll('#userForm input, #userForm select');
            inputFields.forEach(field => {
                field.disabled = false;
            });
            
            // 启用保存按钮
            const saveButton = document.querySelector('#userForm button[type="submit"]');
            saveButton.disabled = false;
            saveButton.classList.remove('opacity-50', 'cursor-not-allowed');
            
            document.getElementById('userModal').classList.remove('hidden');
        });

        // 关闭模态框
        document.getElementById('closeModal').addEventListener('click', function() {
            document.getElementById('userModal').classList.add('hidden');
        });

        document.getElementById('cancelBtn').addEventListener('click', function() {
            document.getElementById('userModal').classList.add('hidden');
        });

        // 编辑用户
        function editUser(id) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.id === id);
            
            if (user) {
                // 检查是否为默认用户
                const isDefault = user.id === 1 || user.isDefault;
                
                document.getElementById('modalTitle').textContent = isDefault ? '查看用户信息' : '编辑用户';
                document.getElementById('userId').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('password').value = user.password;
                document.getElementById('role').value = user.role;
                
                // 禁用默认用户的输入字段
                const inputFields = document.querySelectorAll('#userForm input, #userForm select');
                inputFields.forEach(field => {
                    if (isDefault) {
                        field.disabled = true;
                    } else {
                        field.disabled = false;
                    }
                });
                
                // 禁用或启用保存按钮
                const saveButton = document.querySelector('#userForm button[type="submit"]');
                if (isDefault) {
                    saveButton.disabled = true;
                    saveButton.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    saveButton.disabled = false;
                    saveButton.classList.remove('opacity-50', 'cursor-not-allowed');
                }
                
                document.getElementById('userModal').classList.remove('hidden');
            }
        }

        // 删除用户
        function deleteUser(id) {
            if (id === 1) {
                alert('不能删除默认管理员账户');
                return;
            }
            
            // 创建确认提醒窗口
            const confirmMessage = '确定要删除这个用户吗？\n此操作不可恢复。';
            
            // 显示确认对话框
            const result = confirm(confirmMessage);
            
            // 只有当用户点击确认时才执行删除操作
            if (result === true) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const filteredUsers = users.filter(u => u.id !== id);
                localStorage.setItem('users', JSON.stringify(filteredUsers));
                loadUsers();
                // 显示删除成功提醒
                alert('用户删除成功');
            }
            // 取消操作不显示提醒
        }



        // 保存用户
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (id) {
                // 编辑现有用户
                const userIndex = users.findIndex(u => u.id == id);
                if (userIndex !== -1) {
                    users[userIndex] = {
                        ...users[userIndex],
                        username,
                        password,
                        role
                    };
                }
            } else {
                // 添加新用户
                const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
                users.push({
                    id: newId,
                    username,
                    password,
                    role,
                    createdAt: new Date().toLocaleString('zh-CN')
                });
            }
            
            localStorage.setItem('users', JSON.stringify(users));
            document.getElementById('userModal').classList.add('hidden');
            loadUsers();
        });

        // 初始化默认用户数据
        function initDefaultUsers() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // 检查是否已存在默认管理员用户
            const defaultAdminIndex = users.findIndex(user => user.id === 1);
            
            if (defaultAdminIndex !== -1) {
                // 更新现有默认用户的用户名和密码
                users[defaultAdminIndex] = {
                    ...users[defaultAdminIndex],
                    username: '1329923942@qq.com',
                    password: '18802595319Xx',
                    role: 'admin',
                    isDefault: true
                };
            } else {
                // 创建默认管理员用户
                const defaultAdmin = {
                    id: 1,
                    username: '1329923942@qq.com',
                    password: '18802595319Xx',
                    role: 'admin',
                    createdAt: new Date().toLocaleString('zh-CN'),
                    isDefault: true
                };
                users.push(defaultAdmin);
            }
            
            localStorage.setItem('users', JSON.stringify(users));
        }

        // 密码可见性切换
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            }
        });

        // 加载数据
        initDefaultUsers();
        loadUsers();
    </script>
</body>
</html>
