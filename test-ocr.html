<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度OCR接口测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-xl font-bold">OCR接口测试</h1>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 测试卡片 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold mb-4">百度OCR接口测试</h2>
            
            <!-- API配置信息 -->
            <div class="mb-6">
                <h3 class="text-sm font-medium text-gray-400 mb-2">API配置信息</h3>
                <div class="space-y-2">
                    <div class="flex items-center">
                        <span class="w-24 text-gray-400">API Key:</span>
                        <span id="apiKey" class="text-white">IWuZdXzexxFHbJwvidvfWcQT</span>
                    </div>
                    <div class="flex items-center">
                        <span class="w-24 text-gray-400">Secret Key:</span>
                        <span id="secretKey" class="text-white">aQMPy9B5A1GiZEGIMNDexPqe3TMgFRGM</span>
                    </div>
                    <div class="flex items-center">
                        <span class="w-24 text-gray-400">Token URL:</span>
                        <span class="text-white">https://aip.baidubce.com/oauth/2.0/token</span>
                    </div>
                    <div class="flex items-center">
                        <span class="w-24 text-gray-400">OCR URL:</span>
                        <span class="text-white">https://aip.baidubce.com/rest/2.0/ocr/v1/accurate_basic</span>
                    </div>
                </div>
            </div>
            
            <!-- 测试选项 -->
            <div class="mb-6">
                <h3 class="text-sm font-medium text-gray-400 mb-2">测试选项</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-400 mb-2">选择测试方式</label>
                        <div class="flex space-x-4">
                            <button id="testTokenBtn" class="btn btn-primary">测试获取Token</button>
                            <button id="testOCRBtn" class="btn btn-secondary">测试OCR识别</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-2">上传测试图片</label>
                        <input type="file" id="testImage" accept="image/*" class="input">
                    </div>
                </div>
            </div>
            
            <!-- 测试结果 -->
            <div class="mb-6">
                <h3 class="text-sm font-medium text-gray-400 mb-2">测试结果</h3>
                <div id="testResult" class="bg-gray-800 p-4 rounded-lg min-h-[200px] overflow-auto">
                    <p class="text-gray-400">点击测试按钮开始测试...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 百度OCR API配置信息
        const API_KEY = 'IWuZdXzexxFHbJwvidvfWcQT';
        const SECRET_KEY = 'aQMPy9B5A1GiZEGIMNDexPqe3TMgFRGM';
        const TOKEN_URL = 'https://aip.baidubce.com/oauth/2.0/token';
        const OCR_URL = 'https://aip.baidubce.com/rest/2.0/ocr/v1/general'; // 通用文字识别（标准含位置版）

        // 测试获取Token
        document.getElementById('testTokenBtn').addEventListener('click', async function() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '<p class="text-gray-400">正在测试获取Token...</p>';
            
            try {
                const response = await fetch(`${TOKEN_URL}?grant_type=client_credentials&client_id=${API_KEY}&client_secret=${SECRET_KEY}`);
                const data = await response.json();
                
                if (data.access_token) {
                    resultDiv.innerHTML = `
                        <div class="space-y-2">
                            <p class="text-green-400">✓ Token获取成功</p>
                            <p class="text-sm">Access Token: ${data.access_token.substring(0, 50)}...</p>
                            <p class="text-sm">Token类型: ${data.token_type}</p>
                            <p class="text-sm">过期时间: ${data.expires_in}秒</p>
                            <p class="text-sm">Scope: ${data.scope}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="space-y-2">
                            <p class="text-red-400">✗ Token获取失败</p>
                            <p class="text-sm">错误码: ${data.error}</p>
                            <p class="text-sm">错误信息: ${data.error_description}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="space-y-2">
                        <p class="text-red-400">✗ 网络错误</p>
                        <p class="text-sm">错误信息: ${error.message}</p>
                    </div>
                `;
            }
        });

        // 测试OCR识别
        document.getElementById('testOCRBtn').addEventListener('click', async function() {
            const fileInput = document.getElementById('testImage');
            const resultDiv = document.getElementById('testResult');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                resultDiv.innerHTML = '<p class="text-red-400">请先上传测试图片</p>';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '<p class="text-gray-400">正在测试OCR识别...</p>';
            
            try {
                // 读取图片
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = async function(e) {
                    try {
                        // 转换为Base64
                        const base64 = e.target.result.split(',')[1];
                        
                        // 获取access_token
                        const tokenResponse = await fetch(`${TOKEN_URL}?grant_type=client_credentials&client_id=${API_KEY}&client_secret=${SECRET_KEY}`);
                        const tokenData = await tokenResponse.json();
                        
                        if (!tokenData.access_token) {
                            resultDiv.innerHTML = `
                                <div class="space-y-2">
                                    <p class="text-red-400">✗ Token获取失败</p>
                                    <p class="text-sm">错误码: ${tokenData.error}</p>
                                    <p class="text-sm">错误信息: ${tokenData.error_description}</p>
                                </div>
                            `;
                            return;
                        }
                        
                        const accessToken = tokenData.access_token;
                        
                        // 调用OCR API
                        const ocrResponse = await fetch(`${OCR_URL}?access_token=${accessToken}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded'
                            },
                            body: `image=${encodeURIComponent(base64)}`
                        });
                        
                        const ocrData = await ocrResponse.json();
                        
                        if (ocrData.words_result) {
                            // 提取零件编码
                            const partCodes = extractPartCodes(ocrData.words_result);
                            
                            resultDiv.innerHTML = `
                                <div class="space-y-4">
                                    <p class="text-green-400">✓ OCR识别成功</p>
                                    <div>
                                        <h4 class="text-sm font-medium mb-2">识别结果:</h4>
                                        <ul class="list-disc list-inside text-sm space-y-1">
                                            ${ocrData.words_result.map(item => `<li>${item.words}</li>`).join('')}
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 class="text-sm font-medium mb-2">提取的零件编码:</h4>
                                        ${partCodes.length > 0 ? `
                                            <ul class="list-disc list-inside text-sm space-y-1">
                                                ${partCodes.map(code => `<li>${code} (前五位: ${code.substring(0, 5)})</li>`).join('')}
                                            </ul>
                                        ` : '<p class="text-gray-400">未识别到零件编码</p>'}
                                    </div>
                                </div>
                            `;
                        } else {
                            resultDiv.innerHTML = `
                                <div class="space-y-2">
                                    <p class="text-red-400">✗ OCR识别失败</p>
                                    <p class="text-sm">错误码: ${ocrData.error_code}</p>
                                    <p class="text-sm">错误信息: ${ocrData.error_msg}</p>
                                </div>
                            `;
                        }
                    } catch (error) {
                        resultDiv.innerHTML = `
                            <div class="space-y-2">
                                <p class="text-red-400">✗ 网络错误</p>
                                <p class="text-sm">错误信息: ${error.message}</p>
                            </div>
                        `;
                    }
                };
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="space-y-2">
                        <p class="text-red-400">✗ 错误</p>
                        <p class="text-sm">错误信息: ${error.message}</p>
                    </div>
                `;
            }
        });

        // 从 OCR 结果中提取零件编码
        function extractPartCodes(wordsResult) {
            const codes = new Set();
            const partCodePattern = /\d{5,}-\w{3,}-\w{3,}/g;
            
            // 分割文本为行
            const lines = wordsResult.map(item => item.words.trim()).filter(line => line !== '');
            
            lines.forEach(line => {
                const matches = line.match(partCodePattern);
                if (matches) {
                    matches.forEach(match => codes.add(match));
                }
            });
            
            return Array.from(codes);
        }
    </script>
</body>
</html>
