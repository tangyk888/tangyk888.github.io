<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 查询结果</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#06b6d4',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <!-- 返回按钮 -->
                    <button id="backButton" class="p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                    
                    <!-- 标题 -->
                    <h1 class="ml-4 text-xl font-semibold text-gray-800">查询结果</h1>
                </div>
                
                <div class="flex items-center">
                    <!-- 结果数量 -->
                    <span class="text-sm text-gray-600 mr-4">共找到 <span id="resultCount" class="font-medium text-primary">0</span> 条结果</span>
                    
                    <!-- 刷新按钮 -->
                    <button id="refreshButton" class="p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-refresh"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- 查询条件摘要 -->
        <div id="searchSummary" class="bg-white rounded-lg shadow-card p-4 mb-6">
            <h2 class="text-md font-medium text-gray-800 mb-2">查询条件</h2>
            <div id="searchConditions" class="text-sm text-gray-600">
                <!-- 查询条件将在这里显示 -->
            </div>
        </div>
        
        <!-- 结果列表 -->
        <div id="resultsContainer" class="space-y-4">
            <!-- 结果卡片将在这里动态生成 -->
            <div id="loadingResults" class="bg-white rounded-lg shadow-card p-8 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto mb-4"></div>
                <p class="text-gray-600">正在加载查询结果...</p>
            </div>
            
            <div id="noResults" class="hidden bg-white rounded-lg shadow-card p-8 text-center">
                <i class="fa fa-search text-gray-400 text-4xl mb-4"></i>
                <p class="text-gray-600">没有找到匹配的结果</p>
                <button id="newSearchButton" class="mt-4 inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                    <i class="fa fa-refresh mr-2"></i>
                    重新查询
                </button>
            </div>
        </div>
    </main>
    
    <!-- 详情弹窗 -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden">
            <div class="p-4 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-medium text-gray-800">仓位详情</h3>
                <button id="closeDetailButton" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <div class="p-6">
                <div id="detailContent" class="space-y-4">
                    <!-- 详情内容将在这里动态生成 -->
                </div>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end">
                <button id="closeDetailBtn" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        function checkLoginStatus() {
            // 首先检查sessionStorage中的用户信息
            let currentUser = sessionStorage.getItem('currentUser');
            
            // 如果sessionStorage中没有，检查URL参数（访客登录）
            if (!currentUser) {
                const urlParams = new URLSearchParams(window.location.search);
                const encodedUser = urlParams.get('user');
                
                if (encodedUser) {
                    try {
                        // 解码URL参数中的用户信息
                        const userInfo = JSON.parse(atob(encodedUser));
                        if (userInfo && userInfo.guest) {
                            // 这是访客登录，直接使用用户信息
                            currentUser = JSON.stringify(userInfo);
                            // 可选：也保存到sessionStorage以便后续页面使用
                            sessionStorage.setItem('currentUser', currentUser);
                            console.log('从URL参数获取访客用户信息:', userInfo);
                        }
                    } catch (error) {
                        console.error('解析URL用户参数失败:', error);
                    }
                }
            }
            
            if (!currentUser) {
                // 重定向到登录页面
                window.location.href = 'index.html';
                return false;
            }
            
            return true;
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!checkLoginStatus()) {
                return;
            }
            
            // 返回按钮点击事件
            document.getElementById('backButton').addEventListener('click', function() {
                window.location.href = 'search.html';
            });
            
            // 刷新按钮点击事件
            document.getElementById('refreshButton').addEventListener('click', function() {
                // 重新加载当前页面
                window.location.reload();
            });
            
            // 重新查询按钮点击事件
            document.getElementById('newSearchButton').addEventListener('click', function() {
                window.location.href = 'search.html';
            });
            
            // 关闭详情弹窗按钮点击事件
            document.getElementById('closeDetailButton').addEventListener('click', function() {
                document.getElementById('detailModal').classList.add('hidden');
            });
            
            document.getElementById('closeDetailBtn').addEventListener('click', function() {
                document.getElementById('detailModal').classList.add('hidden');
            });
            
            // 点击弹窗外部关闭弹窗
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
            
            // 解析URL参数并执行查询
            const urlParams = new URLSearchParams(window.location.search);
            displaySearchConditions(urlParams);
            performSearch(urlParams);
        });
        
        // 显示查询条件
        function displaySearchConditions(params) {
            const container = document.getElementById('searchConditions');
            const conditions = [];
            
            // 检查是否有批量扫描参数
            const batchParams = params.getAll('batch');
            if (batchParams.length > 0) {
                conditions.push(`批量扫码: ${batchParams.length} 个条码`);
            } else {
                // 检查单个查询参数
                if (params.has('code')) {
                    conditions.push(`编码: ${params.get('code')}`);
                }
                
                if (params.has('name')) {
                    conditions.push(`名称: ${params.get('name')}`);
                }
                
                if (params.has('position')) {
                    conditions.push(`仓位: ${params.get('position')}`);
                }
            }
            
            // 如果没有条件，显示"全部"
            if (conditions.length === 0) {
                conditions.push('全部');
            }
            
            // 显示条件
            container.innerHTML = conditions.join(' | ');
        }
        
        // 执行查询
        function performSearch(params) {
            // 获取所有仓位数据
            const positions = JSON.parse(localStorage.getItem('warehousePositions')) || [];
            
            // 准备查询条件
            const searchConditions = {
                code: params.get('code') || '',
                name: params.get('name') || '',
                position: params.get('position') || '',
                batch: params.getAll('batch')
            };
            
            // 过滤结果
            let results = positions;
            
            // 处理批量扫描
            if (searchConditions.batch.length > 0) {
                results = results.filter(pos => {
                    // 解析批量扫描的每个条码
                    return searchConditions.batch.some(batchItem => {
                        try {
                            // 获取系统设置
                            const settings = JSON.parse(localStorage.getItem('warehouseSettings')) || {};
                            const delimiter = settings.delimiter || ',';
                            
                            // 解析二维码数据
                            const parts = batchItem.split(delimiter);
                            
                            if (parts.length < 3) {
                                return false;
                            }
                            
                            // 根据设置的格式映射字段
                            const format = settings.qrCodeFormat || 'position,code,name';
                            const formatFields = format.split(',');
                            
                            const result = {};
                            formatFields.forEach((field, index) => {
                                result[field.trim()] = parts[index] || '';
                            });
                            
                            // 检查是否匹配
                            return pos.code === result.code || pos.position === result.position;
                        } catch (error) {
                            console.error('解析批量扫描数据失败:', error);
                            return false;
                        }
                    });
                });
            } else {
                // 处理单个查询条件
                if (searchConditions.code) {
                    // 支持多关键词（空格分隔）
                    const keywords = searchConditions.code.split(' ').filter(k => k.trim());
                    results = results.filter(pos => 
                        keywords.some(keyword => pos.code.toLowerCase().includes(keyword.toLowerCase()))
                    );
                }
                
                if (searchConditions.name) {
                    // 支持多关键词（空格分隔）
                    const keywords = searchConditions.name.split(' ').filter(k => k.trim());
                    results = results.filter(pos => 
                        keywords.some(keyword => pos.name.toLowerCase().includes(keyword.toLowerCase()))
                    );
                }
                
                if (searchConditions.position) {
                    // 支持多关键词（空格分隔）
                    const keywords = searchConditions.position.split(' ').filter(k => k.trim());
                    results = results.filter(pos => 
                        keywords.some(keyword => pos.position.toLowerCase().includes(keyword.toLowerCase()))
                    );
                }
            }
            
            // 显示结果
            displayResults(results);
        }
        
        // 显示查询结果
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            const loadingElement = document.getElementById('loadingResults');
            const noResultsElement = document.getElementById('noResults');
            const resultCountElement = document.getElementById('resultCount');
            
            // 隐藏加载状态
            loadingElement.classList.add('hidden');
            
            // 更新结果数量
            resultCountElement.textContent = results.length;
            
            // 清空容器
            container.innerHTML = '';
            
            // 添加结果卡片
            if (results.length > 0) {
                results.forEach(pos => {
                    const card = createResultCard(pos);
                    container.appendChild(card);
                });
            } else {
                // 显示无结果提示
                container.appendChild(noResultsElement);
                noResultsElement.classList.remove('hidden');
            }
        }
        
        // 创建结果卡片
        function createResultCard(position) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-card overflow-hidden hover:shadow-lg transition-all-300';
            card.dataset.id = position.id;
            
            // 卡片内容
            card.innerHTML = `
                <div class="p-6">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">
                            <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center">
                                ${position.image ? 
                                    `<img src="${position.image}" alt="${position.name}" class="w-full h-full object-cover rounded-lg">` : 
                                    `<i class="fa fa-cube text-gray-400 text-2xl"></i>`
                                }
                            </div>
                        </div>
                        
                        <div class="ml-4 flex-1">
                            <div class="flex items-center justify-between">
                                <h3 class="text-lg font-medium text-gray-900">${position.name}</h3>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                    ${position.position}
                                </span>
                            </div>
                            
                            <p class="mt-1 text-sm text-gray-500">编码: ${position.code}</p>
                            
                            <div class="mt-4 flex items-center justify-between">
                                <div class="text-xs text-gray-500">
                                    <span>创建时间: ${formatDate(position.createdAt)}</span>
                                    ${position.updatedAt !== position.createdAt ? 
                                        `<span class="ml-2">更新时间: ${formatDate(position.updatedAt)}</span>` : ''
                                    }
                                </div>
                                
                                <button class="view-detail-btn inline-flex items-center px-3 py-1.5 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                                    <i class="fa fa-eye mr-1"></i>
                                    查看详情
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 添加查看详情事件
            card.querySelector('.view-detail-btn').addEventListener('click', function() {
                showDetailModal(position);
            });
            
            return card;
        }
        
        // 显示详情弹窗
        function showDetailModal(position) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');
            
            // 详情内容
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center mb-4">
                            ${position.image ? 
                                `<img src="${position.image}" alt="${position.name}" class="w-full h-full object-cover rounded-lg">` : 
                                `<i class="fa fa-cube text-gray-400 text-4xl"></i>`
                            }
                        </div>
                        
                        <div class="text-center">
                            <h4 class="text-lg font-medium text-gray-900">${position.name}</h4>
                            <p class="text-sm text-gray-500">${position.code}</p>
                        </div>
                    </div>
                    
                    <div>
                        <div class="space-y-4">
                            <div>
                                <h5 class="text-sm font-medium text-gray-500 mb-1">仓位</h5>
                                <p class="text-lg font-medium text-gray-900">${position.position}</p>
                            </div>
                            
                            <div>
                                <h5 class="text-sm font-medium text-gray-500 mb-1">编码</h5>
                                <p class="text-gray-900">${position.code}</p>
                            </div>
                            
                            <div>
                                <h5 class="text-sm font-medium text-gray-500 mb-1">名称</h5>
                                <p class="text-gray-900">${position.name}</p>
                            </div>
                            
                            <div class="pt-2 border-t border-gray-200">
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <h5 class="text-sm font-medium text-gray-500 mb-1">创建时间</h5>
                                        <p class="text-sm text-gray-900">${formatDateTime(position.createdAt)}</p>
                                    </div>
                                    
                                    <div>
                                        <h5 class="text-sm font-medium text-gray-500 mb-1">更新时间</h5>
                                        <p class="text-sm text-gray-900">${formatDateTime(position.updatedAt)}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 显示弹窗
            modal.classList.remove('hidden');
        }
        
        // 格式化日期（简短）
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}-${padZero(date.getMonth() + 1)}-${padZero(date.getDate())}`;
        }
        
        // 格式化日期时间
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return `${formatDate(dateString)} ${padZero(date.getHours())}:${padZero(date.getMinutes())}:${padZero(date.getSeconds())}`;
        }
        
        // 数字补零
        function padZero(num) {
            return num.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
