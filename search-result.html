<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 查询结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .result-table {
                @apply w-full bg-dark-card rounded-lg overflow-hidden;
            }
            .result-table th {
                @apply bg-gray-800 py-3 px-4 text-left text-sm text-gray-400;
            }
            .result-table td {
                @apply py-3 px-4 border-t border-gray-700;
            }
            .result-table tr:hover {
                @apply bg-gray-800;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center">
            <button id="backBtn" class="mr-4 text-gray-400 hover:text-primary">
                <i class="fa fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-xl font-bold text-white">查询结果</h1>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">查询结果</h1>
            <p id="resultCount" class="text-gray-400">找到 0 个匹配的仓位信息</p>
        </div>
        
        <div id="resultContainer" class="mb-8">
            <!-- 结果表格将通过JavaScript动态生成 -->
        </div>
        <div id="noResult" class="card text-center py-12 hidden">
            <i class="fa fa-search text-4xl text-gray-400 mb-4"></i>
            <p class="text-gray-400">未找到匹配的仓位信息</p>
        </div>
    </main>

    <!-- 详情模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 w-full max-w-4xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold">仓位详情</h3>
                <button id="closeDetailModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-2xl"></i>
                </button>
            </div>
            <div id="detailContent" class="space-y-6">
                <!-- 详情内容将通过JavaScript动态生成 -->
            </div>

        </div>
    </div>
    
    <!-- 图片放大模态框 -->
    <div id="imageModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
        <div class="relative w-full max-w-4xl">
            <button id="closeImageModal" class="absolute top-4 right-4 text-white bg-black/50 rounded-full p-2 z-10">
                <i class="fa fa-times text-xl"></i>
            </button>
            <img id="modalImage" src="" alt="放大图片" class="w-full h-auto max-h-[80vh] object-contain">
        </div>
    </div>
    


    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 返回按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 加载数据并显示结果
        function loadResults() {
            const searchParams = JSON.parse(localStorage.getItem('searchParams') || '{}');
            const scanResult = localStorage.getItem('scanResult');
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            
            let filteredItems = warehouseItems;
            
            // 处理扫码结果
            if (scanResult) {
                // 解析二维码数据（固定格式为：仓位 编码 名称）
                const qrParts = scanResult.split(' ');
                if (qrParts.length >= 3) {
                    const location = qrParts[0];
                    const code = qrParts[1];
                    const name = qrParts.slice(2).join(' ');
                    
                    filteredItems = warehouseItems.filter(item => 
                        item.location === location || 
                        item.code === code || 
                        item.name === name
                    );
                } else {
                    // 尝试模糊匹配
                    filteredItems = warehouseItems.filter(item => 
                        item.location.includes(scanResult) || 
                        item.code.includes(scanResult) || 
                        item.name.includes(scanResult)
                    );
                }
                // 清除扫码结果
                localStorage.removeItem('scanResult');
            } else {
                // 处理手动查询参数
                if (searchParams.code) {
                    filteredItems = filteredItems.filter(item => 
                        item.code.toLowerCase().includes(searchParams.code.toLowerCase())
                    );
                }
                if (searchParams.name) {
                    filteredItems = filteredItems.filter(item => 
                        item.name.toLowerCase().includes(searchParams.name.toLowerCase())
                    );
                }
                if (searchParams.location) {
                    filteredItems = filteredItems.filter(item => 
                        item.location.toLowerCase().includes(searchParams.location.toLowerCase())
                    );
                }
            }
            
            const resultContainer = document.getElementById('resultContainer');
            const noResult = document.getElementById('noResult');
            const resultCount = document.getElementById('resultCount');
            
            // 更新结果数量
            resultCount.textContent = `找到 ${filteredItems.length} 个匹配的仓位信息`;
            
            if (filteredItems.length > 0) {
                // 生成表格
                let tableHTML = `
                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>编码</th>
                                <th>名称</th>
                                <th>仓位</th>
                                <th>图片</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                filteredItems.forEach((item, index) => {
                    // 获取第一张图片或显示空白
                    const firstImage = item.images && item.images.length > 0 ? item.images[0] : '';
                    
                    tableHTML += `
                        <tr>
                        <td>${item.code || '-'}</td>
                        <td>${item.name || '-'}</td>
                        <td>${item.location || '-'}</td>
                        <td>
                            ${firstImage ? `
                                <img src="${firstImage}" alt="${item.name || '图片'}" class="w-16 h-16 object-cover rounded">
                            ` : `
                                <div class="w-16 h-16 bg-gray-800 rounded"></div>
                            `}
                        </td>
                        <td>
                            <button class="text-primary hover:underline" onclick="viewDetail(${index})"><i class="fa fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                    `;
                });
                
                tableHTML += `
                        </tbody>
                    </table>
                `;
                
                resultContainer.innerHTML = tableHTML;
                noResult.classList.add('hidden');
            } else {
                resultContainer.innerHTML = '';
                noResult.classList.remove('hidden');
            }
        }
        
        // 查看详情
        function viewDetail(index) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const item = warehouseItems[index];
            const detailContent = document.getElementById('detailContent');
            
            if (item) {
                // 生成详情内容
                detailContent.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- 左侧信息 -->
                        <div class="space-y-6">
                            <div>
                                <h4 class="text-gray-400 text-sm mb-1">仓位</h4>
                                <p class="text-2xl font-bold text-white">${item.location || '-'}</p>
                            </div>
                            <div>
                                <h4 class="text-gray-400 text-sm mb-1">编码</h4>
                                <p class="text-lg text-white">${item.code || '-'}</p>
                            </div>
                            <div>
                                <h4 class="text-gray-400 text-sm mb-1">名称</h4>
                                <p class="text-lg text-white">${item.name || '-'}</p>
                            </div>


                        </div>
                        
                        <!-- 右侧图片 -->
                        <div>
                            <h4 class="text-gray-400 text-sm mb-3">图片</h4>
                            ${item.images && item.images.length > 0 ? `
                                <div class="bg-gray-900 border border-gray-700 rounded-lg p-4 max-h-64 overflow-y-auto">
                                    <div class="grid grid-cols-2 gap-2">
                                        ${item.images.map((img, imgIndex) => `
                                            <div class="aspect-video">
                                                <img src="${img}" alt="${item.name || '图片'} ${imgIndex + 1}" class="w-full h-full object-cover rounded-lg cursor-pointer" onclick="openImageModal('${img}')">
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : `
                                <div class="bg-gray-900 border border-gray-700 rounded-lg h-64 flex items-center justify-center">
                                    <div class="text-center">
                                        <i class="fa fa-picture-o text-4xl text-gray-600 mb-2"></i>
                                        <p class="text-gray-400">暂无图片</p>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                `;
                
                // 显示模态框
                document.getElementById('detailModal').classList.remove('hidden');
            }
        }
        
        // 打开图片放大模态框
        function openImageModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        
        // 关闭图片放大模态框
        document.getElementById('closeImageModal').addEventListener('click', function() {
            document.getElementById('imageModal').classList.add('hidden');
        });
        
        // 点击模态框背景关闭
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });
        
        // 关闭详情模态框
        document.getElementById('closeDetailModal').addEventListener('click', function() {
            document.getElementById('detailModal').classList.add('hidden');
        });
        


        // 加载结果
        loadResults();
    </script>
</body>
</html>
