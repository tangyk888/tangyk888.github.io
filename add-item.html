<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 仓位录入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
            .table {
                @apply w-full border-collapse;
            }
            .table th {
                @apply bg-gray-800 border-b border-gray-700 py-3 px-4 text-left text-sm text-gray-400;
            }
            .table td {
                @apply border-b border-gray-700 py-3 px-4 text-sm;
            }
            .table tr:hover {
                @apply bg-gray-800;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <button id="backBtn" class="mr-4 text-gray-400 hover:text-white">
                    <i class="fa fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-xl font-bold">仓位录入</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="index.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">返回主页</a>
                        <a href="user-management.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">用户管理</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">仓位录入</h1>
            <p class="text-gray-400">添加和管理仓位信息</p>
            <div class="w-24 h-1 bg-primary mx-auto mt-4"></div>
        </div>

        <!-- 录入表单 -->
        <div class="card mb-8">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <i class="fa fa-plus-circle text-primary mr-2"></i>
                    <h2 class="text-lg font-semibold">添加仓位</h2>
                </div>
                <div class="flex space-x-2">
                    <button type="button" id="cameraBtnAdd" class="btn bg-green-600 text-white p-3">
                        <i class="fa fa-camera"></i>
                    </button>
                    <button type="button" id="albumBtnAdd" class="btn bg-blue-600 text-white p-3">
                        <i class="fa fa-picture-o"></i>
                    </button>
                    <button type="button" id="scanQrBtn" class="btn btn-primary p-3">
                        <i class="fa fa-qrcode"></i>
                    </button>
                </div>
            </div>
            <form id="manualForm" class="space-y-4">
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">仓位</label>
                    <input type="text" id="location" class="input" placeholder="输入仓位">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">编码</label>
                    <input type="text" id="code" class="input" placeholder="输入编码">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">名称</label>
                    <input type="text" id="name" class="input" placeholder="输入名称">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2 text-sm">图片</label>
                    <input type="file" id="image" class="input" accept="image/*" multiple>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fa fa-plus mr-2"></i>添加
                    </button>
                </div>
            </form>
            <div id="qrScanArea" class="hidden mt-6">
                <div class="border border-gray-700 rounded-lg p-4">
                    <h3 class="text-md font-medium mb-4">扫码录入</h3>
                    <div class="flex justify-center">
                        <video id="qrVideo" class="w-full border rounded-md"></video>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="stopQrScanBtn" class="btn btn-primary">
                            <i class="fa fa-stop mr-2"></i>停止扫码
                        </button>
                        <p class="text-gray-400 text-sm mt-2">二维码格式：仓位|编码|名称</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 仓位列表 -->
        <div class="card">
            <div class="flex items-center mb-4 bg-gray-800 p-4 rounded-t-lg">
                <i class="fa fa-list text-primary mr-2"></i>
                <h2 class="text-lg font-semibold">已录入仓位</h2>
            </div>
            <div class="overflow-x-auto bg-gray-900 rounded-b-lg">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-3 px-4 text-left text-sm text-gray-400">仓位</th>
                            <th class="py-3 px-4 text-left text-sm text-gray-400">编码</th>
                            <th class="py-3 px-4 text-left text-sm text-gray-400">名称</th>
                            <th class="py-3 px-4 text-right text-sm text-gray-400">操作</th>
                        </tr>
                    </thead>
                    <tbody id="itemTableBody">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 详细信息模态框 -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 w-full max-w-4xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold">详细信息</h3>
                <button id="closeDetailModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div id="detailContent" class="space-y-6">
                <!-- 详细信息将通过JavaScript动态生成 -->
            </div>
            <div class="mt-6 flex justify-end space-x-4">
                <button id="deleteDetailBtn" class="btn bg-red-600 text-white hover:bg-red-500 flex items-center">
                    <i class="fa fa-trash mr-2"></i> 删除
                </button>
                <button id="editDetailBtn" class="btn bg-blue-600 text-white hover:bg-blue-500 flex items-center">
                    <i class="fa fa-pencil mr-2"></i> 编辑
                </button>
                <button id="closeDetailBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">关闭</button>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="editModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 w-full max-w-4xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold">编辑仓位</h3>
                <button id="closeEditModal" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <form id="editForm" class="space-y-6">
                <input type="hidden" id="editIndex">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 左侧信息编辑 -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 mb-2 text-sm">仓位</label>
                            <input type="text" id="editLocation" class="input" placeholder="输入仓位">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-2 text-sm">编码</label>
                            <input type="text" id="editCode" class="input" placeholder="输入编码">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-2 text-sm">名称</label>
                            <input type="text" id="editName" class="input" placeholder="输入名称">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-2 text-sm">创建时间</label>
                            <input type="text" id="editCreatedAt" class="input bg-gray-800" disabled>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-2 text-sm">更新时间</label>
                            <input type="text" id="editUpdatedAt" class="input bg-gray-800" disabled>
                        </div>
                    </div>
                    
                    <!-- 右侧图片预览 -->
                    <div>
                        <label class="block text-gray-400 mb-2 text-sm">图片</label>
                        <div class="bg-gray-900 border border-gray-700 rounded-lg p-4">
                            <div id="editImagePreview" class="grid grid-cols-3 gap-2">
                                <!-- 图片将通过JavaScript动态生成 -->
                            </div>
                        </div>
                        <div class="mt-4 flex space-x-4">
                            <input type="file" id="editImage" class="hidden" accept="image/*" capture="camera" multiple>
                            <button type="button" id="selectImageBtn" class="btn bg-blue-600 text-white hover:bg-blue-500 flex-1 flex items-center justify-center">
                                <i class="fa fa-camera mr-2"></i> 手机拍照
                            </button>
                            <button type="button" id="selectAlbumBtn" class="btn bg-green-600 text-white hover:bg-green-500 flex-1 flex items-center justify-center">
                                <i class="fa fa-picture-o mr-2"></i> 提取相册
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 底部按钮 -->
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancelEditBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 图片放大模态框 -->
    <div id="imageModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden">
        <div class="relative w-full max-w-4xl">
            <button id="closeImageModal" class="absolute top-4 right-4 text-white bg-black/50 rounded-full p-2 z-10">
                <i class="fa fa-times text-xl"></i>
            </button>
            <img id="modalImage" src="" alt="放大图片" class="w-full h-auto max-h-[80vh] object-contain">
        </div>
    </div>

    <script>
        // 检查登录状态
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        // 菜单控制
        document.getElementById('menuBtn').addEventListener('click', function() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('hidden');
        });

        // 点击其他地方关闭菜单
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu');
            const menuBtn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        // 返回按钮
        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 加载仓位数据
        function loadItems() {
            // 确保DOM已经加载完成
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadItems);
                return;
            }
            
            // 从localStorage获取数据
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            
            // 如果没有数据，添加测试数据
            if (warehouseItems.length === 0) {
                const testItems = [
                    { location: 'A1', code: '001', name: '测试仓位1', createdAt: new Date().toLocaleString('zh-CN'), updatedAt: new Date().toLocaleString('zh-CN') },
                    { location: 'A2', code: '002', name: '测试仓位2', createdAt: new Date().toLocaleString('zh-CN'), updatedAt: new Date().toLocaleString('zh-CN') }
                ];
                localStorage.setItem('warehouseItems', JSON.stringify(testItems));
            }
            
            // 获取表格体元素
            const tableBody = document.getElementById('itemTableBody');
            if (!tableBody) {
                console.error('找不到itemTableBody元素');
                return;
            }
            
            // 清空表格
            tableBody.innerHTML = '';
            
            // 从localStorage重新获取数据
            const updatedItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            
            // 显示数据
            if (updatedItems.length === 0) {
                // 显示空状态
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="4" class="py-8 text-center text-gray-400">
                        <i class="fa fa-folder-open text-4xl mb-2"></i>
                        <p>暂无已录入的仓位</p>
                    </td>
                `;
                tableBody.appendChild(emptyRow);
            } else {
                // 显示数据
                updatedItems.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.className = 'border-b border-gray-700 hover:bg-gray-800';
                    row.innerHTML = `
                        <td class="py-3 px-4">${item.location || '-'}</td>
                        <td class="py-3 px-4">${item.code || '-'}</td>
                        <td class="py-3 px-4">${item.name || '-'}</td>
                        <td class="py-3 px-4 flex justify-end space-x-3">
                            <button class="text-primary hover:underline" onclick="viewDetail(${index})">
                                <i class="fa fa-eye"></i>
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // 编辑项目
        function editItem(index) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const item = warehouseItems[index];
            
            if (item) {
                document.getElementById('editIndex').value = index;
                document.getElementById('editLocation').value = item.location;
                document.getElementById('editCode').value = item.code;
                document.getElementById('editName').value = item.name;
                
                // 设置时间信息
                const now = new Date().toLocaleString('zh-CN');
                document.getElementById('editCreatedAt').value = item.createdAt || now;
                document.getElementById('editUpdatedAt').value = now;
                
                // 设置图片预览
                const imagePreview = document.getElementById('editImagePreview');
                if (item.images && item.images.length > 0) {
                    imagePreview.innerHTML = '';
                    item.images.forEach((img, imgIndex) => {
                        imagePreview.innerHTML += `
                            <div class="relative">
                                <img src="${img}" alt="${item.name} ${imgIndex + 1}" class="w-full h-24 object-cover rounded-lg cursor-pointer" onclick="openImageModal('${img}')">
                                <button type="button" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600" onclick="deleteImage(${index}, ${imgIndex})">
                                    <i class="fa fa-trash text-xs"></i>
                                </button>
                            </div>
                        `;
                    });
                } else {
                    imagePreview.innerHTML = `
                        <div class="col-span-3 flex items-center justify-center h-48 text-center">
                            <div>
                                <i class="fa fa-picture-o text-4xl text-gray-600 mb-2"></i>
                                <p class="text-gray-400">暂无图片</p>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('editModal').classList.remove('hidden');
            }
        }

        // 选择图片按钮点击事件（编辑页面）
        document.getElementById('selectImageBtn').addEventListener('click', function() {
            document.getElementById('editImage').click();
        });

        // 选择相册按钮点击事件（编辑页面）
        document.getElementById('selectAlbumBtn').addEventListener('click', function() {
            document.getElementById('editImage').click();
        });

        // 图片预览
        document.getElementById('editImage').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const imagePreview = document.getElementById('editImagePreview');
                
                // 清空预览区域，只显示新选择的图片预览
                imagePreview.innerHTML = '';
                
                for (let i = 0; i < files.length; i++) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imagePreview.innerHTML += `
                            <div class="relative">
                                <img src="${e.target.result}" alt="预览图片" class="w-full h-24 object-cover rounded-lg cursor-pointer" onclick="openImageModal('${e.target.result}')">
                            </div>
                        `;
                    };
                    reader.readAsDataURL(files[i]);
                }
            }
        });

        // 关闭编辑模态框
        document.getElementById('closeEditModal').addEventListener('click', function() {
            document.getElementById('editModal').classList.add('hidden');
        });

        document.getElementById('cancelEditBtn').addEventListener('click', function() {
            document.getElementById('editModal').classList.add('hidden');
        });

        // 保存编辑
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const location = document.getElementById('editLocation').value;
            const code = document.getElementById('editCode').value;
            const name = document.getElementById('editName').value;
            const editImage = document.getElementById('editImage');
            
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const now = new Date().toLocaleString('zh-CN');
            
            // 只更新有值的字段，实现按需录入
            const updatedItem = {
                ...warehouseItems[index],
                updatedAt: now
            };
            
            if (location) updatedItem.location = location;
            if (code) updatedItem.code = code;
            if (name) updatedItem.name = name;
            
            // 检查是否有新选择的图片
            let files = [];
            if (editImage.files && editImage.files.length > 0) {
                files = [...files, ...Array.from(editImage.files)];
            }
            
            if (files.length > 0) {
                // 保留原有图片
                const existingImages = warehouseItems[index].images || [];
                const images = [...existingImages];
                let loadedCount = 0;
                const totalFiles = files.length;
                
                for (let i = 0; i < totalFiles; i++) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        images.push(e.target.result);
                        loadedCount++;
                        if (loadedCount === totalFiles) {
                            updatedItem.images = images;
                            warehouseItems[index] = updatedItem;
                            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
                            document.getElementById('editModal').classList.add('hidden');
                            loadItems();
                        }
                    };
                    reader.readAsDataURL(files[i]);
                }
            } else {
                warehouseItems[index] = updatedItem;
                localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
                document.getElementById('editModal').classList.add('hidden');
                loadItems();
            }
        });



        // 查看详情
        function viewDetail(index) {
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const item = warehouseItems[index];
            const detailContent = document.getElementById('detailContent');
            
            // 保存当前查看的索引，用于编辑和删除操作
            window.currentDetailIndex = index;
            
            detailContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 左侧信息 -->
                    <div class="space-y-6">
                        <div>
                            <h4 class="text-gray-400 text-sm mb-1">仓位</h4>
                            <p class="text-2xl font-bold text-white">${item.location || '-'}</p>
                        </div>
                        <div>
                            <h4 class="text-gray-400 text-sm mb-1">编码</h4>
                            <p class="text-lg text-white">${item.code || '-'}</p>
                        </div>
                        <div>
                            <h4 class="text-gray-400 text-sm mb-1">名称</h4>
                            <p class="text-lg text-white">${item.name || '-'}</p>
                        </div>
                        <div>
                            <h4 class="text-gray-400 text-sm mb-1">创建时间</h4>
                            <p class="text-sm text-gray-300">${item.createdAt || '未知'}</p>
                        </div>
                        <div>
                            <h4 class="text-gray-400 text-sm mb-1">更新时间</h4>
                            <p class="text-sm text-gray-300">${item.updatedAt || '未知'}</p>
                        </div>
                    </div>
                    
                    <!-- 右侧图片 -->
                    <div>
                        <h4 class="text-gray-400 text-sm mb-3">图片</h4>
                        ${item.images && item.images.length > 0 ? `
                            <div class="grid grid-cols-2 gap-2">
                                ${item.images.map((img, imgIndex) => `
                                    <div class="relative">
                                        <img src="${img}" alt="${item.name || '图片'} ${imgIndex + 1}" class="w-full h-32 object-cover rounded-lg cursor-pointer" onclick="openImageModal('${img}')">
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="bg-gray-900 border border-gray-700 rounded-lg h-64 flex items-center justify-center">
                                <div class="text-center">
                                    <i class="fa fa-picture-o text-4xl text-gray-600 mb-2"></i>
                                    <p class="text-gray-400">暂无图片</p>
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // 删除项目
        function deleteItem(index) {
            if (confirm('确定要删除这个仓位吗？')) {
                const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
                warehouseItems.splice(index, 1);
                localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
                loadItems();
            }
        }

        // 手机拍照按钮点击事件（添加页面）
        document.getElementById('cameraBtnAdd').addEventListener('click', function() {
            document.getElementById('image').click();
        });

        // 提取相册按钮点击事件（添加页面）
        document.getElementById('albumBtnAdd').addEventListener('click', function() {
            document.getElementById('image').click();
        });

        // 图片预览 - 相机/相册（添加页面）
        document.getElementById('image').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                console.log('选择了', files.length, '张图片');
            }
        });

        // 手动录入表单提交
        document.getElementById('manualForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const location = document.getElementById('location').value;
            const code = document.getElementById('code').value;
            const name = document.getElementById('name').value;
            const imageInput = document.getElementById('image');
            
            // 允许部分字段为空，实现按需录入
            let images = [];
            if (imageInput.files && imageInput.files.length > 0) {
                let loadedCount = 0;
                const totalFiles = imageInput.files.length;
                
                for (let i = 0; i < totalFiles; i++) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        images.push(e.target.result);
                        loadedCount++;
                        if (loadedCount === totalFiles) {
                            saveItem(location, code, name, images);
                        }
                    };
                    reader.readAsDataURL(imageInput.files[i]);
                }
            } else {
                saveItem(location, code, name, images);
            }
        });

        // 保存项目
        function saveItem(location, code, name, images) {
            // 从localStorage获取数据
            const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
            const now = new Date().toLocaleString('zh-CN');
            
            // 创建新的仓位对象，只包含有值的字段
            const newItem = {
                createdAt: now,
                updatedAt: now
            };
            
            // 按需录入，只添加有值的字段
            if (location) newItem.location = location;
            if (code) newItem.code = code;
            if (name) newItem.name = name;
            if (images && images.length > 0) newItem.images = images;
            
            // 添加到数组
            warehouseItems.push(newItem);
            
            // 保存到localStorage
            localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
            console.log('保存成功，数据：', warehouseItems);
            
            // 清空表单
            document.getElementById('location').value = '';
            document.getElementById('code').value = '';
            document.getElementById('name').value = '';
            document.getElementById('image').value = '';
            
            // 重新加载列表
            loadItems();
        }

        // 二维码扫描
        let qrVideo = document.getElementById('qrVideo');
        let qrStream;

        document.getElementById('scanQrBtn').addEventListener('click', function() {
            document.getElementById('qrScanArea').classList.remove('hidden');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(s) {
                    qrStream = s;
                    qrVideo.srcObject = s;
                    qrVideo.setAttribute('playsinline', true);
                    qrVideo.play();
                    requestAnimationFrame(qrTick);
                })
                .catch(function(err) {
                    console.error('Error accessing camera:', err);
                    alert('无法访问摄像头');
                });
        });

        document.getElementById('stopQrScanBtn').addEventListener('click', function() {
            if (qrStream) {
                qrStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('qrScanArea').classList.add('hidden');
        });

        function qrTick() {
            if (qrVideo.readyState === qrVideo.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = qrVideo.videoWidth;
                canvas.height = qrVideo.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(qrVideo, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    // 解析二维码数据
                    const qrData = code.data;
                    const qrParts = qrData.split('|');
                    
                    if (qrParts.length >= 3) {
                        const location = qrParts[0];
                        const code = qrParts[1];
                        const name = qrParts[2];
                        
                        // 停止扫码
                        if (qrStream) {
                            qrStream.getTracks().forEach(track => track.stop());
                        }
                        document.getElementById('qrScanArea').classList.add('hidden');
                        
                        // 保存项目
                        saveItem(location, code, name, []);
                    } else {
                        alert('二维码格式不正确，应为：仓位|编码|名称');
                    }
                }
            }
            requestAnimationFrame(qrTick);
        }

        // 打开图片放大模态框
        function openImageModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        // 关闭图片放大模态框
        document.getElementById('closeImageModal').addEventListener('click', function() {
            document.getElementById('imageModal').classList.add('hidden');
        });

        // 点击模态框背景关闭
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // 详细信息模态框编辑按钮点击事件
        document.getElementById('editDetailBtn').addEventListener('click', function() {
            if (window.currentDetailIndex !== undefined) {
                editItem(window.currentDetailIndex);
                document.getElementById('detailModal').classList.add('hidden');
            }
        });

        // 详细信息模态框删除按钮点击事件
        document.getElementById('deleteDetailBtn').addEventListener('click', function() {
            if (window.currentDetailIndex !== undefined) {
                deleteItem(window.currentDetailIndex);
                document.getElementById('detailModal').classList.add('hidden');
            }
        });

        // 关闭详情模态框
        document.getElementById('closeDetailModal').addEventListener('click', function() {
            document.getElementById('detailModal').classList.add('hidden');
        });

        document.getElementById('closeDetailBtn').addEventListener('click', function() {
            document.getElementById('detailModal').classList.add('hidden');
        });

        // 删除图片
        function deleteImage(itemIndex, imgIndex) {
            if (confirm('确定要删除这张图片吗？')) {
                const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
                const item = warehouseItems[itemIndex];
                
                if (item && item.images && item.images.length > 0) {
                    // 从图片数组中删除指定索引的图片
                    item.images.splice(imgIndex, 1);
                    item.updatedAt = new Date().toLocaleString('zh-CN');
                    
                    // 保存到localStorage
                    localStorage.setItem('warehouseItems', JSON.stringify(warehouseItems));
                    
                    // 重新加载编辑模态框，更新图片预览
                    editItem(itemIndex);
                }
            }
        }

        // 加载数据
        loadItems();
    </script>
</body>
</html>
