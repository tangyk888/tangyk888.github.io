<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                    },
                },
            }
        }
    </script>
    <!-- 系统背景核心样式 - 可直接复用 --> 
    <style type="text/tailwindcss"> 
        @layer utilities { 
            .content-auto { 
                content-visibility: auto; 
            }
            .card {
                @apply glass rounded-xl shadow-lg p-8;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-white/10 border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white pl-10;
            }
            /* 背景相关核心样式 */ 
            .glass { 
                background: rgba(255, 255, 255, 0.05); 
                backdrop-filter: blur(10px); 
                -webkit-backdrop-filter: blur(10px); 
                border: 1px solid rgba(255, 255, 255, 0.1); 
            } 
            .glass-light { 
                background: rgba(255, 255, 255, 0.08); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px); 
                border: 1px solid rgba(255, 255, 255, 0.15); 
            } 
            .glass-dark { 
                background: rgba(0, 0, 0, 0.4); 
                backdrop-filter: blur(10px); 
                -webkit-backdrop-filter: blur(10px); 
                border: 1px solid rgba(255, 255, 255, 0.05); 
            } 
            .animate-pulse-slow { 
                animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
            } 
            @keyframes pulse { 
                0%, 100% { opacity: 1; } 
                50% { opacity: 0.7; } 
            } 
        } 
    </style> 
    
    <!-- 系统背景配置 (tailwind 主题色) --> 
    <script> 
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#0066ff', 
                        secondary: '#00aaff', 
                        dark: '#0a0a0a', 
                        'dark-light': '#121212', 
                        'dark-lighter': '#1e1e1e', 
                        'text-primary': '#ffffff', 
                        'text-secondary': '#b0b0b0', 
                        'text-tertiary': '#707070' 
                    } 
                } 
            } 
        } 
    </script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-dark to-dark-light">
    <!-- 页面通用背景模板 - 可直接嵌入任意页面 --> 
    <div class="absolute inset-0 z-0"> 
        <!-- 渐变遮罩层 --> 
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-dark-light to-dark opacity-50"></div> 
        
        <!-- 模糊装饰圆 (主色调) --> 
        <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-primary rounded-full filter blur-[150px] opacity-10 animate-pulse-slow"></div> 
        
        <!-- 可选：第二个装饰圆 (辅助色) --> 
        <!-- <div class="absolute bottom-1/3 left-1/4 w-96 h-96 bg-secondary rounded-full filter blur-[150px] opacity-10 animate-pulse-slow" style="animation-delay: 2s;"></div> --> 
    </div> 
    <div class="w-full max-w-md relative z-10">
        <div class="card">
            <div class="text-center mb-8">
                <p class="text-white mt-2 text-4xl font-bold">YICHENGQIPEI</p>
                <p class="text-gray-300 mt-2">仓库仓位查询系统</p>
                <div class="w-24 h-1 bg-primary mx-auto mt-4"></div>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-gray-300 mb-2">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-user"></i>
                        </span>
                        <input type="text" id="username" class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white pl-10" required>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 mb-2">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white pl-10 pr-10" required>
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-white">
                            <i class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="mr-2">
                    <label for="remember" class="text-gray-300">记住我</label>
                </div>
                <button type="submit" class="btn btn-primary w-full text-lg py-4">登录</button>
            </form>
            <div class="mt-8 text-center text-gray-400 text-sm">
                &copy; 2026 YICHENGQIPEI. 保留所有权利。
            </div>
        </div>
    </div>
    <script>
        // 初始化默认用户
        if (!localStorage.getItem('users')) {
            const defaultUsers = [
                { id: 1, username: '1329923942@qq.com', password: '18802595319Xx', role: 'admin' },
                { id: 2, username: 'user', password: 'user123', role: 'user' }
            ];
            localStorage.setItem('users', JSON.stringify(defaultUsers));
        } else {
            // 确保默认用户密码是正确的
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const defaultAdminIndex = users.findIndex(user => user.id === 1);
            if (defaultAdminIndex !== -1) {
                users[defaultAdminIndex].password = '18802595319Xx';
                localStorage.setItem('users', JSON.stringify(users));
            }
        }

        // 初始化仓位数据
        if (!localStorage.getItem('warehouseItems')) {
            const defaultItems = [];
            localStorage.setItem('warehouseItems', JSON.stringify(defaultItems));
        }

        // 切换密码可见性
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });

        // 页面加载时检查是否有记住的登录信息
        window.addEventListener('load', function() {
            const rememberMe = localStorage.getItem('rememberMe');
            if (rememberMe === 'true') {
                const savedUsername = localStorage.getItem('savedUsername');
                const savedPassword = localStorage.getItem('savedPassword');
                if (savedUsername && savedPassword) {
                    document.getElementById('username').value = savedUsername;
                    document.getElementById('password').value = savedPassword;
                    document.getElementById('remember').checked = true;
                }
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                // 记录登录时间
                const loginTime = new Date().getTime();
                localStorage.setItem('loginTime', loginTime);
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // 处理记住我功能
                if (remember) {
                    localStorage.setItem('rememberMe', 'true');
                    localStorage.setItem('savedUsername', username);
                    localStorage.setItem('savedPassword', password);
                } else {
                    localStorage.removeItem('rememberMe');
                    localStorage.removeItem('savedUsername');
                    localStorage.removeItem('savedPassword');
                }
                
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });
    </script>
</body>
</html>
