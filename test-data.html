<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试数据</title>
</head>
<body>
    <h1>测试 localStorage 数据</h1>
    <div id="data-container"></div>
    <script>
        // 检查 localStorage 中的数据
        const warehouseItems = JSON.parse(localStorage.getItem('warehouseItems') || '[]');
        console.log('warehouseItems:', warehouseItems);
        
        // 显示数据
        const dataContainer = document.getElementById('data-container');
        dataContainer.innerHTML = `
            <h2>仓库数据</h2>
            <pre>${JSON.stringify(warehouseItems, null, 2)}</pre>
            <p>数据长度: ${warehouseItems.length}</p>
        `;
        
        // 手动添加测试数据
        function addTestData() {
            const testItems = [
                { location: 'A1', code: '001', name: '测试仓位1', createdAt: new Date().toLocaleString('zh-CN'), updatedAt: new Date().toLocaleString('zh-CN') },
                { location: 'A2', code: '002', name: '测试仓位2', createdAt: new Date().toLocaleString('zh-CN'), updatedAt: new Date().toLocaleString('zh-CN') },
                { location: 'A3', code: '003', name: '测试仓位3', createdAt: new Date().toLocaleString('zh-CN'), updatedAt: new Date().toLocaleString('zh-CN') }
            ];
            localStorage.setItem('warehouseItems', JSON.stringify(testItems));
            console.log('添加测试数据成功');
            location.reload();
        }
        
        // 清空数据
        function clearData() {
            localStorage.removeItem('warehouseItems');
            console.log('清空数据成功');
            location.reload();
        }
    </script>
    <button onclick="addTestData()">添加测试数据</button>
    <button onclick="clearData()">清空数据</button>
</body>
</html>
