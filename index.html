<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客登录 - 仓库仓位查询系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <!-- 访客登录标题 -->
            <div class="bg-blue-600 text-white p-6">
                <h1 class="text-2xl font-bold text-center">访客登录</h1>
                <p class="text-center text-blue-100 mt-1">无需存储的快速访问方式</p>
            </div>
            
            <!-- 登录选项 -->
            <div class="p-6">
                <div class="text-center mb-6">
                    <p class="text-gray-600">请选择您的用户角色</p>
                </div>
                
                <div class="space-y-4">
                    <!-- 管理员登录按钮 -->
                    <button id="loginAdmin" class="w-full bg-green-600 text-white py-3 px-4 rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 transition-colors flex items-center justify-center">
                        <i class="fa fa-user-circle mr-3 text-xl"></i>
                        <div class="text-left">
                            <div class="font-semibold">管理员</div>
                            <div class="text-sm text-green-100">完全访问权限</div>
                        </div>
                    </button>
                    
                    <!-- 普通用户登录按钮 -->
                    <button id="loginUser" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors flex items-center justify-center">
                        <i class="fa fa-user mr-3 text-xl"></i>
                        <div class="text-left">
                            <div class="font-semibold">普通用户</div>
                            <div class="text-sm text-blue-100">查询和录入权限</div>
                        </div>
                    </button>
                </div>
                
                <!-- 状态信息 -->
                <div id="loginStatus" class="mt-6 p-4 rounded-md text-center hidden"></div>
                
                <!-- 系统信息 -->
                <div class="mt-8 p-4 bg-gray-50 rounded-lg">
                    <h3 class="text-sm font-semibold text-gray-700 mb-2">系统信息:</h3>
                    <div class="text-xs text-gray-600 space-y-1">
                        <div><i class="fa fa-info-circle mr-1 text-blue-500"></i> 账号: admin / admin123 (管理员)</div>
                        <div><i class="fa fa-info-circle mr-1 text-blue-500"></i> 账号: user / user123 (普通用户)</div>
                        <div><i class="fa fa-shield mr-1 text-green-500"></i> 本页面不使用浏览器存储</div>
                    </div>
                </div>
            </div>
            
            <!-- 底部链接 -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <div class="text-center text-sm text-gray-600 space-x-4">
                    <span class="text-gray-600">
                        <i class="fa fa-home mr-1"></i>首页
                    </span>
                    <span class="text-gray-400">|</span>
                    <a href="test-login.html" class="text-blue-600 hover:underline">
                        <i class="fa fa-wrench mr-1"></i>测试工具
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 访客登录函数 - 使用URL参数而不是存储
        function guestLogin(username, role) {
            const statusDiv = document.getElementById('loginStatus');
            
            // 清除之前的状态
            statusDiv.className = 'mt-6 p-4 rounded-md text-center hidden';
            
            try {
                // 显示登录成功消息
                statusDiv.className = 'mt-6 p-4 rounded-md text-center bg-green-100 text-green-700';
                statusDiv.innerHTML = `
                    <i class="fa fa-check-circle text-xl mb-2"></i>
                    <div>登录成功，正在跳转...</div>
                    <div class="text-sm mt-1">角色: ${role === 'admin' ? '管理员' : '普通用户'}</div>
                `;
                statusDiv.classList.remove('hidden');
                
                console.log('访客登录:', { username, role });
                
                // 延迟跳转到查询页面，使用URL参数传递用户信息
                setTimeout(() => {
                    // 使用URL参数传递用户信息（Base64编码）
                    const userInfo = { username, role, guest: true };
                    const encodedUserInfo = btoa(JSON.stringify(userInfo));
                    window.location.href = `search.html?user=${encodedUserInfo}`;
                }, 1500);
                
            } catch (error) {
                statusDiv.className = 'mt-6 p-4 rounded-md text-center bg-red-100 text-red-700';
                statusDiv.innerHTML = `
                    <i class="fa fa-exclamation-circle text-xl mb-2"></i>
                    <div>登录失败</div>
                    <div class="text-sm mt-1">${error.message}</div>
                `;
                statusDiv.classList.remove('hidden');
                console.error('访客登录失败:', error);
            }
        }
        
        // 管理员登录按钮
        document.getElementById('loginAdmin').addEventListener('click', function() {
            this.disabled = true;
            this.classList.add('opacity-75');
            guestLogin('admin', 'admin');
        });
        
        // 普通用户登录按钮
        document.getElementById('loginUser').addEventListener('click', function() {
            this.disabled = true;
            this.classList.add('opacity-75');
            guestLogin('user', 'user');
        });
        
        // 页面加载时的初始化
        window.addEventListener('load', function() {
            console.log('访客登录页面加载完成');
            
            // 检查URL是否已有用户信息（用于测试）
            const urlParams = new URLSearchParams(window.location.search);
            const testUser = urlParams.get('test');
            
            if (testUser) {
                console.log('检测到测试参数:', testUser);
                if (testUser === 'admin') {
                    document.getElementById('loginAdmin').click();
                } else if (testUser === 'user') {
                    document.getElementById('loginUser').click();
                }
            }
        });
    </script>
</body>
</html>
