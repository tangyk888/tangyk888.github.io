<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>仓位管理 · 扫码录入</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4f5f7;
            margin: 0;
            min-height: 100vh;
            padding: 8px;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #e9edf2;
            margin: 0 auto;
        }
        .status-bar {
            background: #fefefe;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e6ea;
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
        }
        .time-badge {
            background: #f1f4f9;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 15px;
        }
        .sheet-tabs {
            display: flex;
            gap: 2px;
            background: #ffffff;
            padding: 0 16px;
        }
        .sheet-tab {
            padding: 8px 24px;
            background: #f8fafc;
            border: 1px solid #dee4ec;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            font-weight: 500;
            color: #3f4a5a;
            font-size: 15px;
            margin-right: 4px;
        }
        .sheet-tab.active {
            background: white;
            border-bottom: 2px solid #2563eb;
            color: #1e40af;
            font-weight: 600;
        }
        .table-wrapper {
            padding: 16px 20px;
            background: white;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 18px;
            font-size: 15px;
            min-width: 500px;
        }
        th {
            background: #f7f9fc;
            font-weight: 600;
            color: #1e2a3a;
            border-bottom: 2px solid #cdd9e9;
            padding: 14px 8px;
            text-align: left;
            border-right: 1px solid #e2e8f0;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e9edf3;
            border-right: 1px solid #eef2f6;
            color: #1f2a41;
            vertical-align: middle;
        }
        th:last-child, td:last-child { border-right: none; }
        .col-sub { font-size: 12px; color: #64748b; margin-left: 6px; }
        .scan-panel {
            background: #f8fafd;
            padding: 20px 24px;
            border-top: 1px solid #dde3ec;
        }
        .scan-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .scan-header h3 { margin: 0; font-size: 18px; color: #1e293b; }
        .scan-btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .scan-btn:active { transform: scale(0.97); }
        .manual-input-area {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            margin-top: 16px;
        }
        .manual-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: white;
            border: 1px solid #cad5e2;
            border-radius: 60px;
            padding: 4px 18px;
        }
        .input-row input {
            flex: 1;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            background: transparent;
            outline: none;
        }
        .input-row button {
            background: #2563eb;
            border: none;
            border-radius: 50px;
            padding: 10px 22px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .mock-qr-hint {
            background: #eef4ff;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 14px;
            color: #1e3a8a;
            border: 1px dashed #3b82f6;
            margin-top: 12px;
            cursor: pointer;
        }
        .clear-btn {
            background: white;
            border: 1px solid #b3c6df;
            border-radius: 40px;
            padding: 9px 25px;
            font-weight: 500;
            color: #415a77;
            cursor: pointer;
            font-size: 14px;
        }
        .footer-note {
            padding: 8px 24px 16px 24px;
            font-size: 13px;
            color: #6b7b93;
            background: #ffffff;
            border-top: 1px solid #eef3f9;
            display: flex;
            justify-content: space-between;
        }
        #scanner-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 16px auto;
            display: none;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #2563eb;
        }
        #scanner-video {
            width: 100%;
            height: auto;
            display: block;
        }
        .close-scanner {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="status-bar">
        <div class="time-badge" id="current-time"></div>
        <div style="display: flex; gap: 5px;">
            <span style="color:#1e293b;">📦 仓位扫码管理</span>
        </div>
    </div>
    <div style="padding-left:20px;">
        <div class="sheet-tabs">
            <span class="sheet-tab active">Sheet1</span>
            <span class="sheet-tab">Sheet2</span>
            <span class="sheet-tab">Sheet3</span>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
            <tr>
                <th>A <span class="col-sub">仓位</span></th>
                <th>B <span class="col-sub">编码</span></th>
                <th>C <span class="col-sub">名称</span></th>
                <th>D</th>
                <th>E</th>
                <th>F</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="scan-panel">
        <div class="scan-header">
            <h3>
                <span>📷 扫码录入</span>
            </h3>
            <button class="scan-btn" id="startScanBtn">
                <span>🔍</span> 打开摄像头扫码
            </button>
            <button class="clear-btn" id="clearRowBtn">清空当前行</button>
        </div>

        <!-- 摄像头预览区 -->
        <div id="scanner-container">
            <video id="scanner-video" autoplay playsinline></video>
            <div style="display: flex; gap: 8px; padding: 8px; background: white;">
                <button id="closeScannerBtn" class="close-scanner">关闭摄像头</button>
                <span style="flex:1; text-align:center; color:#64748b; align-self:center;">将二维码对准摄像头</span>
            </div>
        </div>

        <!-- 手动输入区 -->
        <div class="manual-input-area">
            <div class="manual-label">
                <span>⌨️ 手动输入/粘贴二维码内容</span>
                <span style="background:#f1f5f9; padding:4px 8px; border-radius:30px; font-size:12px;">格式: 仓位X-X 编码XXXX 名称XXXX</span>
            </div>
            <div class="input-row">
                <input type="text" id="qrInput" placeholder="例如 仓位A-1 编码12345 名称前杠" autofocus>
                <button id="manualFillBtn">填入表格</button>
            </div>
            <div class="mock-qr-hint" id="mockHint">
                <span>⬇️ 点击此处模拟扫码</span>
                <span style="font-weight:500;">仓位A-1 编码12345 名称前杠</span>
            </div>
        </div>
    </div>

    <div class="footer-note">
        <span>✅ 自动归列：仓位→A列，编码→B列，名称→C列。扫码后追加到第一个空白行</span>
        <span>📱 点击单元格可直接编辑</span>
    </div>
</div>

<!-- 引入轻量扫码库 jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
    (function() {
        // 显示当前时间
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 表格数据
        const MAX_ROW = 36;
        let tableData = [];
        for (let i = 0; i < MAX_ROW; i++) {
            tableData[i] = ['', '', '', '', '', ''];
        }

        const tbody = document.getElementById('tableBody');
        const qrInput = document.getElementById('qrInput');
        const manualFillBtn = document.getElementById('manualFillBtn');
        const clearBtn = document.getElementById('clearRowBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const closeScannerBtn = document.getElementById('closeScannerBtn');
        const scannerContainer = document.getElementById('scanner-container');
        const scannerVideo = document.getElementById('scanner-video');
        const mockHint = document.getElementById('mockHint');

        let stream = null;
        let scanning = false;

        // 渲染表格
        function renderTable() {
            let htmlStr = '';
            for (let r = 0; r < MAX_ROW; r++) {
                htmlStr += '<tr>';
                for (let c = 0; c < 6; c++) {
                    let value = tableData[r][c] || '';
                    htmlStr += `<td contenteditable="true" data-row="${r}" data-col="${c}">${escapeHtml(value)}</td>`;
                }
                htmlStr += '</tr>';
            }
            tbody.innerHTML = htmlStr;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function attachCellEvents() {
            const cells = tbody.querySelectorAll('td[contenteditable="true"]');
            cells.forEach(cell => {
                cell.addEventListener('input', function() {
                    const row = parseInt(this.dataset.row);
                    const col = parseInt(this.dataset.col);
                    if (!isNaN(row) && !isNaN(col) && row >= 0 && row < MAX_ROW && col >=0 && col <6) {
                        tableData[row][col] = this.innerText;
                    }
                });
            });
        }

        function refreshTable() {
            renderTable();
            attachCellEvents();
        }

        // 解析二维码内容
        function parseQrContent(qrStr) {
            if (!qrStr || qrStr.trim() === '') return null;
            const trimmed = qrStr.trim();
            
            const locationMatch = trimmed.match(/仓位[：:]?\s*([^\s]+)/);
            const idMatch = trimmed.match(/编码[：:]?\s*([^\s]+)/);
            const nameMatch = trimmed.match(/名称[：:]?\s*([^\s]+)/);

            return {
                locationCode: locationMatch ? locationMatch[1].trim() : '',
                idCode: idMatch ? idMatch[1].trim() : '',
                nameCode: nameMatch ? nameMatch[1].trim() : ''
            };
        }

        // 查找第一个空白行
        function findFirstEmptyRow() {
            for (let i = 0; i < MAX_ROW; i++) {
                if (tableData[i][0] === '' && tableData[i][1] === '' && tableData[i][2] === '') {
                    return i;
                }
            }
            return -1;
        }

        // 填充数据
        function fillDataToRow(rowIndex, data) {
            if (rowIndex < 0 || rowIndex >= MAX_ROW) return false;
            if (data.locationCode) tableData[rowIndex][0] = data.locationCode;
            if (data.idCode) tableData[rowIndex][1] = data.idCode;
            if (data.nameCode) tableData[rowIndex][2] = data.nameCode;
            refreshTable();
            return true;
        }

        // 处理扫码结果
        function handleScannedText(text) {
            const parsed = parseQrContent(text);
            if (!parsed || (!parsed.locationCode && !parsed.idCode && !parsed.nameCode)) {
                alert('未识别到有效的仓位信息，请确保二维码包含仓位、编码、名称');
                return false;
            }

            const emptyRow = findFirstEmptyRow();
            if (emptyRow === -1) {
                alert('表格已满，请先清空一些行');
                return false;
            }

            fillDataToRow(emptyRow, parsed);
            return true;
        }

        // 启动摄像头扫码
        async function startScanner() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert('您的浏览器不支持摄像头访问，请使用手动输入或更换现代浏览器');
                    return;
                }

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                scannerVideo.srcObject = stream;
                scannerContainer.style.display = 'block';
                scanning = true;
                scanLoop();
            } catch (err) {
                console.error('启动摄像头失败:', err);
                alert('无法启动摄像头，请确保已授予摄像头权限或使用手动输入');
                scannerContainer.style.display = 'none';
                scanning = false;
            }
        }

        // 扫码循环
        function scanLoop() {
            if (!scanning) return;
            const canvas = document.createElement('canvas');
            const w = scannerVideo.videoWidth;
            const h = scannerVideo.videoHeight;
            if (w === 0 || h === 0) {
                requestAnimationFrame(scanLoop);
                return;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(scannerVideo, 0, 0, w, h);
            const img = ctx.getImageData(0, 0, w, h);
            const code = jsQR(img.data, w, h);
            if (code && code.data) {
                const result = code.data.trim();
                stopScanner();
                handleScannedText(result);
                return;
            }
            requestAnimationFrame(scanLoop);
        }

        // 停止扫码
        function stopScanner() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            scannerContainer.style.display = 'none';
            scanning = false;
        }

        // 事件监听
        startScanBtn.addEventListener('click', startScanner);
        closeScannerBtn.addEventListener('click', stopScanner);

        manualFillBtn.addEventListener('click', function() {
            const text = qrInput.value.trim();
            if (text) {
                handleScannedText(text);
                qrInput.value = '';
            }
        });

        qrInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                manualFillBtn.click();
            }
        });

        mockHint.addEventListener('click', function() {
            handleScannedText('仓位A-1 编码12345 名称前杠');
        });

        clearBtn.addEventListener('click', function() {
            for (let i = MAX_ROW - 1; i >= 0; i--) {
                if (tableData[i][0] !== '' || tableData[i][1] !== '' || tableData[i][2] !== '') {
                    tableData[i] = ['', '', '', '', '', ''];
                    refreshTable();
                    return;
                }
            }
            alert('表格已是空的');
        });

        // 初始化
        refreshTable();
        setTimeout(() => {
            if (tableData[0][0] === '' && tableData[0][1] === '' && tableData[0][2] === '') {
                tableData[0][0] = 'A-1';
                tableData[0][1] = '12345';
                tableData[0][2] = '前杠';
                refreshTable();
            }
        }, 100);
    })();
</script>
</body>
</html>
