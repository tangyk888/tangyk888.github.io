<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>仓位管理系统</title>
<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{margin:0;background:#f4f5f7;padding:8px}

/* 登录 */
#loginWrapper{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{width:90%;max-width:380px;padding:30px;border-radius:16px;background:#f9fafb;text-align:center}
.login-box h3{margin-bottom:20px;color:#1e293b}
.login-input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #cbd5e1;margin-bottom:12px;outline:none;font-size:16px}
.login-btn{width:100%;padding:12px;border-radius:12px;background:#2563eb;color:white;border:none;font-size:16px;margin-bottom:8px;cursor:pointer}
.gray-btn{background:#64748b}

/* 弹窗 */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:99999}
.modal-body{background:#fff;border-radius:16px;width:90%;max-width:400px;padding:24px;max-height:80vh;overflow-y:auto}
.modal-body h4{margin-top:0;margin-bottom:16px}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
.del-user{color:#ef4444;font-size:14px;cursor:pointer}

/* 主界面 */
.app-container{width:100%;max-width:1200px;background:white;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08);overflow:hidden;display:none;margin:0 auto}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid #e2e6ea}
.title{font-size:16px;font-weight:500;color:#1e293b}
.btns{display:flex;gap:8px}
.btn-circle{width:36px;height:36px;border-radius:50%;border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-add{background:#10b981}
.btn-scan{background:#2563eb}
.btn-user{background:#8b5cf6}
.btn-del{background:#ef4444}
.btn-import{background:#0ea5e9}
.btn-export{background:#f59e0b}

.search-bar{padding:12px 20px;border-bottom:1px solid #e2e6ea}
.search-input{width:100%;padding:10px 16px;border-radius:12px;border:1px solid #cbd5e1;outline:none;font-size:16px}

.table-wrapper{padding:16px 20px}
table{width:100%;border-collapse:collapse}
th{background:#f7f9fc;padding:12px 8px;text-align:left;border-bottom:2px solid #cbd5e1}
td{padding:12px 8px;border-bottom:1px solid #e2e6ea}

#scanner{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column;z-index:9999}
#video{width:100%;height:80vh}
#closeScan{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#ef4444;color:white;border:none;border-radius:8px}

.file-input{display:none}
</style>
</head>

<body>

<!-- 登录 -->
<div id="loginWrapper">
  <div class="login-box">
    <h3>仓位管理登录</h3>
    <input class="login-input" id="loginUser" placeholder="用户名" type="text">
    <input class="login-input" id="loginPwd" placeholder="密码" type="password">
    <button class="login-btn" onclick="login()">登录</button>
    <button class="login-btn gray-btn" onclick="showUserManage()">用户管理</button>
  </div>
</div>

<!-- 用户管理 -->
<div class="modal" id="userModal">
  <div class="modal-body">
    <h4>用户管理</h4>
    <div id="userList"></div>
    <hr style="margin:16px 0">
    <input class="login-input" id="newUserName" placeholder="用户名">
    <input class="login-input" id="newUserPwd" placeholder="密码">
    <button class="login-btn" onclick="addUser()">添加用户</button>
    <button class="login-btn gray-btn" style="margin-top:8px" onclick="closeUserModal()">关闭</button>
  </div>
</div>

<!-- 扫码 -->
<div id="scanner">
  <video id="video" autoplay playsinline></video>
  <button id="closeScan" onclick="closeScanner()">关闭</button>
</div>

<!-- 主界面 -->
<div class="app-container" id="mainApp">
  <div class="top-bar">
    <div class="title">📦 仓位扫码管理</div>
    <div class="btns">
      <button class="btn-circle btn-add" onclick="addRow()">＋</button>
      <button class="btn-circle btn-del" onclick="deleteLastRow()">−</button>
      <button class="btn-circle btn-import" onclick="document.getElementById('fileInput').click()">📥</button>
      <button class="btn-circle btn-export" onclick="exportExcel()">📤</button>
      <button class="btn-circle btn-scan" onclick="openScanner()">📷</button>
      <button class="btn-circle btn-user" onclick="showUserManage()">👤</button>
    </div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="search" placeholder="搜索仓位/编码/名称">
    <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv" onchange="importExcel(event)">
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>仓位</th><th>编码</th><th>名称</th><th>D</th><th>E</th><th>F</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ====================== 用户系统 ======================
let currentUser = null;

function initUsers() {
  if (!localStorage.getItem("users")) {
    const users = [{ username: "1329923942@qq.com", password: "18802595319Xx", role: "admin" }];
    localStorage.setItem("users", JSON.stringify(users));
  }
}
initUsers();

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}
function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function login() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPwd").value.trim();
  const users = getUsers();
  const u = users.find(x => x.username === username && x.password === password);
  if (!u) return alert("账号或密码错误");
  currentUser = u;
  document.getElementById("loginWrapper").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
}

function showUserManage() {
  if (!currentUser || currentUser.role !== "admin") {
    alert("仅管理员可操作");
    return;
  }
  document.getElementById("userModal").style.display = "flex";
  renderUserList();
}
function closeUserModal() {
  document.getElementById("userModal").style.display = "none";
}
function renderUserList() {
  const users = getUsers();
  let html = "";
  users.forEach(u => {
    html += `
    <div class="user-item">
      <div>${u.username} (${u.role||"user"})</div>
      ${u.username !== "1329923942@qq.com" ? '<div class="del-user" onclick="delUser(\''+u.username+'\')">删除</div>' : ''}
    </div>`;
  });
  document.getElementById("userList").innerHTML = html;
}
function addUser() {
  const username = document.getElementById("newUserName").value.trim();
  const password = document.getElementById("newUserPwd").value.trim();
  if (!username || !password) return alert("请输入用户名和密码");
  const users = getUsers();
  if (users.some(x => x.username === username)) return alert("用户名已存在");
  users.push({ username, password, role: "user" });
  saveUsers(users);
  renderUserList();
  document.getElementById("newUserName").value = "";
  document.getElementById("newUserPwd").value = "";
}
function delUser(username) {
  if (username === "1329923942@qq.com") return alert("不能删除管理员");
  if (!confirm("确定删除？")) return;
  let users = getUsers();
  users = users.filter(x => x.username !== username);
  saveUsers(users);
  renderUserList();
}

// ====================== 表格 ======================
let data = [];
function loadData() {
  data = JSON.parse(localStorage.getItem("tableData") || "[]");
  renderTable();
}
function saveData() {
  localStorage.setItem("tableData", JSON.stringify(data));
}
function renderTable() {
  const tbody = document.getElementById("tbody");
  let html = "";
  data.forEach((row, i) => {
    html += `<tr>
      <td contenteditable onblur="updateCell(${i},0,this.innerText)">${row[0]||""}</td>
      <td contenteditable onblur="updateCell(${i},1,this.innerText)">${row[1]||""}</td>
      <td contenteditable onblur="updateCell(${i},2,this.innerText)">${row[2]||""}</td>
      <td contenteditable onblur="updateCell(${i},3,this.innerText)">${row[3]||""}</td>
      <td contenteditable onblur="updateCell(${i},4,this.innerText)">${row[4]||""}</td>
      <td contenteditable onblur="updateCell(${i},5,this.innerText)">${row[5]||""}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}
function updateCell(i,c,v){data[i][c]=v;saveData()}
function addRow(){data.push(["","","","","",""]);saveData();renderTable()}
function deleteLastRow(){if(data.length===0)return;if(!confirm("确定删除最后一行？"))return;data.pop();saveData();renderTable()}

document.getElementById("search").oninput = function(){
  const kw = this.value.toLowerCase();
  document.querySelectorAll("#tbody tr").forEach((tr,i)=>{
    const t = (data[i][0]+" "+data[i][1]+" "+data[i][2]).toLowerCase();
    tr.style.display = t.includes(kw)?"":"none";
  })
}

// ====================== Excel ======================
function importExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const arr = XLSX.utils.sheet_to_json(ws, { header: 1 });
    arr.shift();
    data = arr.filter(r=>r.length>0).map(r=>[
      r[0]||"",r[1]||"",r[2]||"",r[3]||"",r[4]||"",r[5]||""
    ]);
    saveData();
    renderTable();
    alert("导入成功");
  };
  reader.readAsBinaryString(file);
}

function exportExcel() {
  const ws = XLSX.utils.aoa_to_sheet([["仓位","编码","名称","D","E","F"],...data]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "仓位数据");
  XLSX.writeFile(wb, "仓位数据.xlsx");
}

// ====================== 扫码 ======================
let video, canvas, ctx, scanning;
function openScanner() {
  document.getElementById("scanner").style.display = "flex";
  video = document.getElementById("video");
  canvas = document.createElement("canvas");
  ctx = canvas.getContext("2d");
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(s=>{video.srcObject=s;scanning=true;scan()});
}
function closeScanner() {
  document.getElementById("scanner").style.display = "none";
  if (video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  scanning = false;
}
function scan() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video,0,0);
    const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
    if (code) {
      const t = code.data.trim();
      const loc = t.match(/仓位[:：]\s*(\S+)/)?.[1]||"";
      const codeStr = t.match(/编码[:：]\s*(\S+)/)?.[1]||"";
      const name = t.match(/名称[:：]\s*(\S+)/)?.[1]||"";
      data.push([loc,codeStr,name,"","",""]);
      saveData();
      renderTable();
      closeScanner();
      return;
    }
  }
  requestAnimationFrame(scan);
}

loadData();
</script>
</body>
</html>
