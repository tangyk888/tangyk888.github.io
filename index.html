<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-dark-card rounded-lg shadow-md p-6;
            }
            .btn {
                @apply px-4 py-3 rounded-md font-medium transition-all;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .input {
                @apply w-full px-4 py-3 bg-dark border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-white;
            }
        }
    </style>
</head>
<body class="bg-dark-bg min-h-screen text-white">
    <!-- 顶部导航 -->
    <header class="bg-dark sticky top-0 z-10 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <h1 class="text-xl font-bold">YICHENGQIPEI</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-gray-400">欢迎, <span class="text-white">admin</span></span>
                <div class="relative">
                    <button id="menuBtn" class="text-gray-400 hover:text-white">
                        <i class="fa fa-ellipsis-v text-xl"></i>
                    </button>
                    <!-- 弹出菜单 -->
                    <div id="menu" class="absolute right-0 mt-2 w-48 bg-dark-card rounded-md shadow-lg py-2 hidden">
                        <a href="user-management.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">用户管理</a>
                        <a href="settings.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">系统设置</a>
                        <a href="login.html" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white">登出</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">仓位查询</h1>
            <p class="text-gray-400">高效管理您的仓库资源，精准定位每个仓位信息</p>
            <div class="w-24 h-1 bg-primary mx-auto mt-4"></div>
        </div>

        <!-- 查询表单 -->
        <div class="card mb-8">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <i class="fa fa-search text-primary mr-2"></i>
                    <h2 class="text-lg font-semibold">查询条件</h2>
                </div>
                <button type="button" id="scanBtn" class="btn btn-primary">
                    <i class="fa fa-qrcode mr-2"></i>扫码查询
                </button>
            </div>
            <form id="searchForm" class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-400 mb-2 text-sm">编码</label>
                        <input type="text" id="code" class="input" placeholder="输入编码">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-2 text-sm">名称</label>
                        <input type="text" id="name" class="input" placeholder="输入名称">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-2 text-sm">仓位</label>
                        <input type="text" id="location" class="input" placeholder="输入仓位">
                    </div>
                </div>
                <div class="flex flex-wrap gap-4 items-center justify-end">
                    <button type="button" id="clearBtn" class="btn bg-gray-700 text-white hover:bg-gray-600">
                        <i class="fa fa-refresh mr-2"></i>清空
                    </button>
                    <button type="submit" class="btn btn-primary py-4 text-lg">
                        <i class="fa fa-search mr-2"></i>查询
                    </button>
                </div>
            </form>
        </div>

        <!-- 添加仓位按钮 -->
        <div class="flex justify-end">
            <a href="add-item.html" class="btn btn-primary py-4 text-lg mb-6">
                <i class="fa fa-plus mr-2"></i>添加仓位
            </a>
        </div>

    </main>

    <!-- 底部导航栏 -->
    <footer class="bg-dark fixed bottom-0 left-0 right-0 border-t border-gray-800 z-10">
        <div class="container mx-auto px-4 py-3">
            <div class="flex space-x-4">
                <a href="inventory.html" class="btn btn-secondary w-full flex items-center justify-center">
                    <i class="fa fa-list-alt mr-2"></i>盘点
                </a>
            </div>
        </div>
    </footer>

    <!-- 扫码区域 -->
    <div id="scanArea" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
        <div class="bg-dark-card rounded-lg p-6 max-w-lg w-full">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold">扫码查询</h2>
                <button id="stopScanBtn" class="text-gray-400 hover:text-white">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="w-full">
                <video id="video" class="w-full h-96 object-cover border rounded-md"></video>
            </div>
            <div class="mt-2 text-center">
                <p class="text-gray-400 text-sm">请将二维码对准摄像头</p>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态和登录时间
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const loginTime = localStorage.getItem('loginTime');
        const eightHoursInMs = 8 * 60 * 60 * 1000;
        const currentTime = new Date().getTime();
        
        if (!currentUser || !loginTime || (currentTime - loginTime) > eightHoursInMs) {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('loginTime');
            window.location.href = 'login.html';
        }
        
        // 每60秒检查一次登录时间
        setInterval(function() {
            const currentTime = new Date().getTime();
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime && (currentTime - loginTime) > eightHoursInMs) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                window.location.href = 'login.html';
            }
        }, 60000);

        // 菜单控制
        document.getElementById('menuBtn').addEventListener('click', function() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('hidden');
        });

        // 点击其他地方关闭菜单
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu');
            const menuBtn = document.getElementById('menuBtn');
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });



        // 清空按钮
        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('确定要清空所有查询条件吗？')) {
                document.getElementById('code').value = '';
                document.getElementById('name').value = '';
                document.getElementById('location').value = '';
            }
        });

        // 查询表单提交
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const name = document.getElementById('name').value;
            const location = document.getElementById('location').value;
            
            // 保存查询参数到本地存储
            localStorage.setItem('searchParams', JSON.stringify({ code, name, location }));
            window.location.href = 'search-result.html';
        });

        // 扫码功能
        let video = document.getElementById('video');
        let stream;

        document.getElementById('scanBtn').addEventListener('click', function() {
            document.getElementById('scanArea').classList.remove('hidden');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(s) {
                    stream = s;
                    video.srcObject = s;
                    video.setAttribute('playsinline', true);
                    video.play();
                    requestAnimationFrame(tick);
                })
                .catch(function(err) {
                    console.error('Error accessing camera:', err);
                    alert('无法访问摄像头');
                });
        });

        document.getElementById('stopScanBtn').addEventListener('click', function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('scanArea').classList.add('hidden');
        });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    // 解析二维码数据
                    const qrData = code.data;
                    console.log('QR Code data:', qrData);
                    
                    // 停止扫码
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                    document.getElementById('scanArea').classList.add('hidden');
                    
                    // 保存扫码结果到本地存储
                    localStorage.setItem('scanResult', qrData);
                    window.location.href = 'search-result.html';
                }
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
