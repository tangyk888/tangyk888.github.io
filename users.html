<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库仓位查询系统 - 用户管理</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#06b6d4',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <!-- 返回按钮 -->
                    <button id="backButton" class="p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                    
                    <!-- 标题 -->
                    <h1 class="ml-4 text-xl font-semibold text-gray-800">用户管理</h1>
                </div>
                
                <div class="flex items-center">
                    <!-- 添加用户按钮 -->
                    <button id="addUserButton" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                        <i class="fa fa-plus mr-2"></i>
                        添加用户
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- 用户列表卡片 -->
        <div class="bg-white rounded-lg shadow-card overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-medium text-gray-800">用户列表</h2>
            </div>
            
            <div class="overflow-x-auto">
                <table id="usersTable" class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                用户名
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                角色
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                创建时间
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                操作
                            </th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- 表格数据将在这里动态生成 -->
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <!-- 添加/编辑用户弹窗 -->
    <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-4 bg-gray-100 border-b border-gray-200 flex justify-between items-center">
                <h3 id="userModalTitle" class="text-lg font-medium text-gray-800">添加用户</h3>
                <button id="closeUserModalButton" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <div class="p-6">
                <form id="userForm" class="space-y-4">
                    <input type="hidden" id="userId">
                    
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" id="username" name="username" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all-300" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码 <span id="passwordRequired" class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all-300" placeholder="请输入密码" required>
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition-all-300">
                                <i class="fa fa-eye-slash"></i>
                            </button>
                        </div>
                        <p id="passwordHint" class="mt-1 text-xs text-gray-500">留空表示不修改密码</p>
                    </div>
                    
                    <div>
                        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">角色 <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <i class="fa fa-user-circle"></i>
                            </span>
                            <select id="role" name="role" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all-300" required>
                                <option value="">请选择角色</option>
                                <option value="admin">管理员</option>
                                <option value="user">普通用户</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end">
                <button id="cancelUserButton" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300 mr-2">
                    取消
                </button>
                <button id="saveUserButton" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300">
                    保存
                </button>
            </div>
        </div>
    </div>
    
    <!-- 确认删除弹窗 -->
    <div id="confirmDeleteModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-4 bg-gray-100 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-800">确认删除</h3>
            </div>
            
            <div class="p-6">
                <p class="text-gray-700">确定要删除用户 <span id="deleteUsername" class="font-medium">admin</span> 吗？</p>
                <p class="text-sm text-gray-500 mt-2">此操作无法撤销。</p>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end">
                <button id="cancelDeleteButton" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300 mr-2">
                    取消
                </button>
                <button id="confirmDeleteButton" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all-300">
                    删除
                </button>
            </div>
        </div>
    </div>
    
    <!-- 操作结果提示 -->
    <div id="operationToast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-white rounded-lg shadow-lg p-4 max-w-md hidden">
        <div class="flex items-center">
            <div class="flex-shrink-0">
                <i id="operationIcon" class="fa fa-check-circle text-green-500 text-xl"></i>
            </div>
            <div class="ml-3">
                <h4 id="operationTitle" class="text-sm font-medium text-gray-900">操作成功</h4>
                <p id="operationMessage" class="text-sm text-gray-500 mt-1">用户信息已保存</p>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        function checkLoginStatus() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (!currentUser) {
                // 重定向到登录页面
                window.location.href = 'index.html';
                return false;
            }
            
            // 检查是否是管理员
            const userInfo = JSON.parse(currentUser);
            if (userInfo.role !== 'admin') {
                // 非管理员重定向到查询页面
                window.location.href = 'search.html';
                return false;
            }
            
            return true;
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!checkLoginStatus()) {
                return;
            }
            
            // 返回按钮点击事件
            document.getElementById('backButton').addEventListener('click', function() {
                window.location.href = 'search.html';
            });
            
            // 添加用户按钮点击事件
            document.getElementById('addUserButton').addEventListener('click', function() {
                showAddUserModal();
            });
            
            // 关闭用户弹窗按钮点击事件
            document.getElementById('closeUserModalButton').addEventListener('click', function() {
                closeUserModal();
            });
            
            document.getElementById('cancelUserButton').addEventListener('click', function() {
                closeUserModal();
            });
            
            // 保存用户按钮点击事件
            document.getElementById('saveUserButton').addEventListener('click', function() {
                saveUser();
            });
            
            // 切换密码显示/隐藏
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                const icon = this.querySelector('i');
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                }
            });
            
            // 确认删除弹窗相关事件
            document.getElementById('cancelDeleteButton').addEventListener('click', function() {
                document.getElementById('confirmDeleteModal').classList.add('hidden');
            });
            
            document.getElementById('confirmDeleteButton').addEventListener('click', function() {
                confirmDeleteUser();
            });
            
            // 点击弹窗外部关闭弹窗
            document.getElementById('userModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
            
            document.getElementById('confirmDeleteModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
            
            // 加载用户数据
            loadUsers();
        });
        
        // 加载用户数据
        function loadUsers() {
            const tableBody = document.getElementById('usersTableBody');
            
            // 获取用户数据
            const users = JSON.parse(localStorage.getItem('warehouseUsers')) || [];
            
            // 清空表格
            tableBody.innerHTML = '';
            
            // 如果没有数据，显示提示
            if (users.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">
                            暂无用户数据
                        </td>
                    </tr>
                `;
                return;
            }
            
            // 添加表格行
            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50';
                row.dataset.id = user.id;
                
                // 表格内容
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${user.username}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${user.role === 'admin' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">
                            ${user.role === 'admin' ? '管理员' : '普通用户'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${formatDateTime(user.createdAt)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <div class="flex space-x-2">
                            <button class="edit-user-btn text-primary hover:text-primary-dark focus:outline-none" title="编辑">
                                <i class="fa fa-pencil"></i>
                            </button>
                            <button class="delete-user-btn text-red-600 hover:text-red-900 focus:outline-none" title="删除">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                
                // 添加事件
                row.querySelector('.edit-user-btn').addEventListener('click', function() {
                    editUser(user);
                });
                
                row.querySelector('.delete-user-btn').addEventListener('click', function() {
                    confirmDelete(user);
                });
                
                // 添加到表格
                tableBody.appendChild(row);
            });
        }
        
        // 显示添加用户弹窗
        function showAddUserModal() {
            const modal = document.getElementById('userModal');
            const title = document.getElementById('userModalTitle');
            const form = document.getElementById('userForm');
            
            // 设置标题
            title.textContent = '添加用户';
            
            // 重置表单
            form.reset();
            document.getElementById('userId').value = '';
            
            // 显示密码必填
            document.getElementById('passwordRequired').classList.remove('hidden');
            document.getElementById('password').required = true;
            document.getElementById('passwordHint').classList.add('hidden');
            
            // 显示弹窗
            modal.classList.remove('hidden');
        }
        
        // 显示编辑用户弹窗
        function editUser(user) {
            const modal = document.getElementById('userModal');
            const title = document.getElementById('userModalTitle');
            const form = document.getElementById('userForm');
            
            // 设置标题
            title.textContent = '编辑用户';
            
            // 填充表单数据
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('password').value = '';
            document.getElementById('role').value = user.role;
            
            // 隐藏密码必填，显示提示
            document.getElementById('passwordRequired').classList.add('hidden');
            document.getElementById('password').required = false;
            document.getElementById('passwordHint').classList.remove('hidden');
            
            // 显示弹窗
            modal.classList.remove('hidden');
        }
        
        // 关闭用户弹窗
        function closeUserModal() {
            document.getElementById('userModal').classList.add('hidden');
        }
        
        // 保存用户
        function saveUser() {
            // 获取表单数据
            const userId = document.getElementById('userId').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            // 验证必填字段
            if (!username || !role) {
                showOperationResult('error', '保存失败', '请填写所有必填字段');
                return;
            }
            
            // 如果是新用户，必须填写密码
            if (!userId && !password) {
                showOperationResult('error', '保存失败', '新用户必须设置密码');
                return;
            }
            
            // 获取现有用户数据
            const users = JSON.parse(localStorage.getItem('warehouseUsers')) || [];
            
            // 检查用户名是否已存在（排除当前编辑的用户）
            const existingUser = users.find(u => u.username === username && u.id !== userId);
            if (existingUser) {
                showOperationResult('error', '保存失败', '用户名已存在');
                return;
            }
            
            if (userId) {
                // 编辑现有用户
                const userIndex = users.findIndex(u => u.id === userId);
                if (userIndex === -1) {
                    showOperationResult('error', '保存失败', '用户不存在');
                    return;
                }
                
                // 更新用户信息
                users[userIndex].username = username;
                users[userIndex].role = role;
                
                // 如果填写了密码，更新密码
                if (password) {
                    users[userIndex].password = password;
                }
                
                showOperationResult('success', '保存成功', '用户信息已更新');
            } else {
                // 添加新用户
                const newUser = {
                    id: 'user' + Date.now(),
                    username: username,
                    password: password,
                    role: role,
                    createdAt: new Date().toISOString()
                };
                
                users.push(newUser);
                
                showOperationResult('success', '保存成功', '用户已添加');
            }
            
            // 保存到本地存储
            localStorage.setItem('warehouseUsers', JSON.stringify(users));
            
            // 关闭弹窗
            closeUserModal();
            
            // 重新加载表格
            loadUsers();
        }
        
        // 确认删除
        function confirmDelete(user) {
            const modal = document.getElementById('confirmDeleteModal');
            const usernameElement = document.getElementById('deleteUsername');
            
            // 设置要删除的用户
            usernameElement.textContent = user.username;
            
            // 保存到全局变量
            window.userToDelete = user.id;
            
            // 显示弹窗
            modal.classList.remove('hidden');
        }
        
        // 确认删除用户
        function confirmDeleteUser() {
            if (!window.userToDelete) {
                return;
            }
            
            // 获取当前登录用户
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            
            // 不允许删除自己
            if (currentUser.id === window.userToDelete) {
                showOperationResult('error', '删除失败', '不能删除当前登录的用户');
                document.getElementById('confirmDeleteModal').classList.add('hidden');
                return;
            }
            
            // 获取用户数据
            const users = JSON.parse(localStorage.getItem('warehouseUsers')) || [];
            
            // 过滤掉要删除的用户
            const updatedUsers = users.filter(u => u.id !== window.userToDelete);
            
            // 保存到本地存储
            localStorage.setItem('warehouseUsers', JSON.stringify(updatedUsers));
            
            // 隐藏弹窗
            document.getElementById('confirmDeleteModal').classList.add('hidden');
            
            // 重新加载表格
            loadUsers();
            
            showOperationResult('success', '删除成功', '用户已删除');
        }
        
        // 显示操作结果提示
        function showOperationResult(type, title, message) {
            const toast = document.getElementById('operationToast');
            const icon = document.getElementById('operationIcon');
            const titleElement = document.getElementById('operationTitle');
            const messageElement = document.getElementById('operationMessage');
            
            // 设置图标和颜色
            if (type === 'success') {
                icon.className = 'fa fa-check-circle text-green-500 text-xl';
            } else if (type === 'error') {
                icon.className = 'fa fa-exclamation-circle text-red-500 text-xl';
            } else {
                icon.className = 'fa fa-info-circle text-blue-500 text-xl';
            }
            
            // 设置标题和消息
            titleElement.textContent = title;
            messageElement.textContent = message;
            
            // 显示提示
            toast.classList.remove('hidden');
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        // 格式化日期时间
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}-${padZero(date.getMonth() + 1)}-${padZero(date.getDate())} ${padZero(date.getHours())}:${padZero(date.getMinutes())}:${padZero(date.getSeconds())}`;
        }
        
        // 数字补零
        function padZero(num) {
            return num.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
